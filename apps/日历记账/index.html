<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
  <title>日历记账本</title>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; padding: 10px; max-width: 500px; margin: auto; }
    body.modal-open { overflow: hidden; position: fixed; width: 100%; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .header button { font-size: 1.2rem; padding: 5px 12px; background: #fff; border: 1px solid #ccc; border-radius: 8px; cursor: pointer; }
    .header h2 { margin: 0; font-size: 1.1rem; }
    .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; background: white; padding: 8px; border-radius: 12px; }
    .day-label { text-align: center; font-weight: bold; padding: 5px 0; color: #666; font-size: 0.85rem; }
    .day-cell { aspect-ratio: 1/1; border-radius: 10px; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; font-size: 0.9rem; border: 1px solid #eee; -webkit-tap-highlight-color: transparent; }
    .day-cell.today { border: 2px solid #007aff; }
    .day-cell.has-record { background: #fff3cd; font-weight: bold; }
    .day-cell .amount { font-size: 0.65rem; color: #d9534f; margin-top: 2px; }
    .day-cell .amount.negative { color: #28a745; }
    .day-cell .amount.positive { color: #007aff; }
    .day-cell .attendance-dots { display: flex; gap: 3px; justify-content: center; margin-bottom: 2px; }
    .attendance-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
    .attendance-dot.full { background-color: #007aff; }
    .attendance-dot.half { background-color: #FF9500; }
    .attendance-dot.overtime { background-color: #FF3B30; }
    .attendance-dot.rest { background-color: #34C759; }
    .attendance-dot.crew { background-color: #000000; }
    .day-cell.empty { background: transparent; border: none; cursor: default; }
    .day-cell .cell-content { display: flex; flex-direction: column; align-items: center; width: 100%; }

    .toolbar { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .toolbar button { padding: 6px 10px; border: 1px solid #ccc; border-radius: 8px; background: #fff; font-size: 0.75rem; cursor: pointer; -webkit-tap-highlight-color: transparent; display: flex; align-items: center; gap: 4px; }
    .toolbar button:active { background: #f0f0f0; }

    .summary { margin-top: 15px; background: white; border-radius: 12px; padding: 12px; margin-bottom: 20px; }
    .summary-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .summary-header h3 { font-size: 1rem; margin: 0; }
    .summary-category { margin-bottom: 12px; padding: 10px; background: #f8f9fa; border-radius: 8px; border-left: 4px solid #007aff; }
    .summary-category-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .summary-category-name-row { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
    .summary-category-name { font-weight: bold; font-size: 0.95rem; color: #333; }
    .summary-category-amount { font-weight: bold; font-size: 1rem; color: #d9534f; }
    .summary-category-amount.negative { color: #28a745; }
    .summary-category-amount.positive { color: #007aff; }
    .summary-category-days { font-size: 0.8rem; color: #666; margin-top: 5px; }
    .summary-category-days span { display: inline-block; background: #e9ecef; padding: 2px 8px; border-radius: 4px; margin: 2px 4px 2px 0; font-size: 0.75rem; }
    .summary-total { margin-top: 12px; padding-top: 10px; border-top: 2px solid #eee; display: flex; justify-content: space-between; font-weight: bold; font-size: 1rem; }

    .btn-sm { border: none; padding: 3px 8px; border-radius: 6px; font-size: 0.7rem; cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
    .btn-export { background: #28a745; color: white; }
    .btn-export:active { background: #1e7e34; }
    .btn-edit { background: #ffc107; color: #333; }
    .btn-edit:active { background: #e0a800; }
    .btn-edit-confirm { background: #007aff; color: white; margin-left: 4px; }
    .btn-edit-cancel { background: #6c757d; color: white; margin-left: 4px; }
    .btn-danger { background: #dc3545 !important; color: white !important; font-weight: bold !important; border: 1px solid #dc3545 !important; }

    .edit-category-row { display: flex; align-items: center; gap: 4px; }
    .edit-category-row input { padding: 4px 8px; border: 1px solid #007aff; border-radius: 6px; font-size: 0.85rem; width: 100px; }

    .export-area { padding: 20px; background: white; }
    .export-title { text-align: center; font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; color: #333; }
    .export-subtitle { text-align: center; font-size: 0.9rem; color: #666; margin-bottom: 15px; }
    .export-category { margin-bottom: 15px; padding: 10px; background: #f8f9fa; border-radius: 8px; border-left: 4px solid #007aff; }
    .export-detail-item { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.85rem; border-bottom: 1px dashed #eee; }
    .export-detail-item .detail-date { color: #666; font-weight: 500; }
    .export-detail-item .detail-note { color: #888; font-size: 0.8rem; }
    .export-detail-item .detail-amount { font-weight: bold; }
    .export-detail-item .detail-amount.positive { color: #d9534f; }
    .export-detail-item .detail-amount.negative { color: #28a745; }
    .export-category-total { display: flex; justify-content: space-between; padding-top: 6px; margin-top: 4px; border-top: 1px solid #ddd; font-weight: bold; font-size: 0.9rem; }

    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 99; overflow: hidden; }
    .modal.active { display: flex; justify-content: center; align-items: center; }
    .modal-content {
      background: white;
      border-radius: 16px;
      padding: 20px;
      width: 100%;
      max-width: 500px;
      max-height: 85vh;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      position: relative;
      margin: 20px;
    }
    .modal-handle { display: none; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .modal-header h3 { font-size: 1rem; margin: 0; }
    .close { font-size: 1.5rem; cursor: pointer; line-height: 1; padding: 5px; -webkit-tap-highlight-color: transparent; }

    .records-section { max-height: 250px; overflow-y: auto; -webkit-overflow-scrolling: touch; margin-bottom: 10px; }
    .record-item { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; margin: 5px 0; padding: 8px 10px; border-radius: 8px; font-size: 0.9rem; }
    .record-item .info { flex: 1; min-width: 0; }
    .record-item .info strong { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .record-item .info small { color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
    .record-item .amount-text { font-weight: bold; margin-left: 10px; white-space: nowrap; flex-shrink: 0; }
    .record-item .amount-text.positive { color: #d9534f; }
    .record-item .amount-text.negative { color: #28a745; }
    .record-item .amount-text.advance { color: #17a2b8; }
    .record-item .amount-text.income { color: #28a745; }
    .delete-btn { background: #dc3545; color: white; border: none; border-radius: 50%; width: 24px; height: 24px; font-size: 14px; cursor: pointer; flex-shrink: 0; margin-left: 8px; -webkit-tap-highlight-color: transparent; }

    .add-form { border-top: 1px solid #eee; padding-top: 12px; }
    .form-group { margin-bottom: 10px; }
    .form-group label { display: block; font-size: 0.85rem; color: #333; margin-bottom: 4px; font-weight: 500; }
    .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; -webkit-appearance: none; }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #007aff; }
    
    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-direction: row;
    }
    .btn-row .btn-add,
    .btn-row .btn-clear,
    .btn-row .btn-attendance,
    .btn-row .btn-add-crew {
      flex: 1;
      padding: 12px 8px;
      border: none;
      border-radius: 10px;
      font-size: 0.85rem;
      cursor: pointer;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-add { background: #007aff; color: white; }
    .btn-add:active { background: #0056b3; }
    .btn-clear { background: #6c757d; color: white; }
    .btn-clear:active { background: #545b62; }
    .btn-attendance { background: #17a2b8; color: white; }
    .btn-attendance:active { background: #138496; }
    .btn-advance-add { background: #17a2b8; }
    .btn-advance-add:active { background: #138496; }
    .btn-add-crew { background: #6c757d; color: white; }
    .btn-income-add { background: #28a745; }
    .btn-income-add:active { background: #1e7e34; }

    .form-switch { display: flex; gap: 4px; margin-bottom: 10px; }
    .form-switch button { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 8px; background: #fff; font-size: 0.75rem; cursor: pointer; }
    .form-switch button.active { background: #007aff; color: white; border-color: #007aff; }

    .attendance-options { display: flex; flex-direction: column; gap: 8px; margin: 10px 0; }
    .attendance-option { padding: 12px; border: 2px solid #eee; border-radius: 10px; text-align: center; cursor: pointer; font-size: 0.9rem; }
    .attendance-option.selected { border-color: #007aff; background: #e8f0fe; }
    .attendance-option input { width: 80px; padding: 5px; border: 1px solid #ddd; border-radius: 5px; text-align: center; display: none; }
    .attendance-option.selected input { display: inline-block; }

    .person-menu-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.4);
      z-index: 200;
      display: none;
      justify-content: center;
      align-items: center;
    }
    .person-menu-modal.active { display: flex; }
    .person-menu-box {
      background: white;
      border-radius: 16px;
      padding: 20px;
      width: 280px;
      text-align: center;
    }
    .person-menu-box h4 { margin-bottom: 15px; font-size: 1.1rem; color: #333; }
    .person-menu-box button {
      display: block;
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
    }
    .person-menu-box .menu-edit { background: #ffc107; color: #333; }
    .person-menu-box .menu-delete { background: #dc3545; color: white; }
    .person-menu-box .menu-cancel { background: #6c757d; color: white; }

    .confirm-dialog { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 199; justify-content: center; align-items: center; }
    .confirm-dialog.active { display: flex; }
    .confirm-box { background: white; border-radius: 14px; padding: 20px; width: 85%; max-width: 350px; text-align: center; }
    .confirm-box p { margin-bottom: 15px; font-size: 0.95rem; }
    .confirm-box .btn-row { justify-content: center; }
    .confirm-box button { padding: 10px 20px; border: none; border-radius: 8px; font-size: 0.9rem; cursor: pointer; }
    .confirm-btn-cancel { background: #f0f0f0; color: #333; margin-right: 10px; }
    .confirm-btn-ok { background: #dc3545; color: white; }

    .loading-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 999; }
    .loading-overlay.active { display: flex; }
    .loading-box { background: white; padding: 20px 30px; border-radius: 12px; text-align: center; }
    .loading-spinner { width: 40px; height: 40px; border: 4px solid #eee; border-top: 4px solid #007aff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; font-size: 0.85rem; z-index: 299; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }

    .attendance-stats { margin-top: 15px; background: #e8f5e9; border-radius: 10px; padding: 10px; font-size: 0.85rem; }
    .attendance-stats h4 { font-size: 0.9rem; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
    .attendance-stats .stat-row { display: flex; justify-content: space-between; margin: 2px 0; }

    .advance-card { margin-top: 15px; background: #fff8e1; border-radius: 10px; padding: 10px; font-size: 0.85rem; border-left: 4px solid #ff9800; }

    .month-list { max-height: 200px; overflow-y: auto; margin: 10px 0; }
    .month-item { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; }
    .month-item input[type="checkbox"] { margin-right: 10px; width: 18px; height: 18px; }
    .month-item label { flex: 1; font-size: 0.9rem; }

    .crew-table { width: 100%; border-collapse: collapse; margin: 10px 0; }
    .crew-table th, .crew-table td { padding: 8px 4px; text-align: center; border-bottom: 1px solid #eee; font-size: 0.85rem; }
    .crew-table th { background: #f8f9fa; font-weight: bold; position: sticky; top: 0; }
    .crew-table .name-col { text-align: left; font-weight: bold; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .crew-table .name-col:hover { background: #e8f0fe; }
    .crew-table .check-col { width: 30px; }
    .crew-table td.clickable { cursor: pointer; -webkit-tap-highlight-color: transparent; border-radius: 4px; }
    .crew-table td.clickable.selected { background: #007aff; color: white; }
    .crew-table td.overtime-cell { cursor: pointer; -webkit-tap-highlight-color: transparent; border-radius: 4px; }
    .crew-table td.overtime-cell.selected { background: #007aff; color: white; }
    
    .batch-bar {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
      font-size: 0.8rem;
      justify-content: flex-start;
    }
    .batch-bar button {
      padding: 4px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 0.75rem;
    }
    .batch-bar button:active { background: #eee; }
    .crew-locked { opacity: 0.5; pointer-events: none; }
    .crew-locked td, .crew-locked button { pointer-events: none; }

    @media (min-width: 768px) {
      .modal-content { max-height: 80vh; }
    }
  </style>
</head>
<body>
  <div id="toast" class="toast"></div>

  <div class="header">
    <button id="prevMonth">&lt;</button>
    <h2 id="monthTitle"></h2>
    <button id="nextMonth">&gt;</button>
  </div>

  <div class="toolbar">
    <button id="exportDataBtn">💾 导出备份</button>
    <button id="importDataBtn">📥 导入备份</button>
    <button id="clearAllBtn" class="btn-danger">🗑️ 清空</button>
  </div>
  <input type="file" id="importFileInput" accept=".json" style="display:none;">

  <div class="calendar" id="calendar"></div>

  <div class="summary">
    <div class="summary-header">
      <h3>📊 本月分类汇总</h3>
    </div>
    <div id="summaryContent"></div>
  </div>

  <div id="exportTemplate" style="position: absolute; left: -9999px; top: 0; width: 500px;"></div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-box">
      <div class="loading-spinner"></div>
      <p>正在生成图片...</p>
    </div>
  </div>

  <div class="confirm-dialog" id="confirmDialog">
    <div class="confirm-box">
      <p id="confirmMessage"></p>
      <div class="btn-row">
        <button class="confirm-btn-cancel" id="confirmCancel">取消</button>
        <button class="confirm-btn-ok" id="confirmOk">确定</button>
      </div>
    </div>
  </div>

  <div class="person-menu-modal" id="personMenuModal">
    <div class="person-menu-box">
      <h4 id="personMenuName"></h4>
      <button class="menu-edit" id="personMenuEdit">✏️ 编辑姓名</button>
      <button class="menu-delete" id="personMenuDelete">🗑️ 删除人员</button>
      <button class="menu-cancel" id="personMenuCancel">取消</button>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content" id="modalContent">
      <div class="modal-header">
        <h3 id="modalDate"></h3>
        <span class="close" id="closeModal">&times;</span>
      </div>
      <div id="modalRecords" class="records-section"></div>
      <div class="form-switch">
        <button id="switchExpense" class="active">💸 记账</button>
        <button id="switchAdvance">💰 预支</button>
        <button id="switchIncome">💵 收款</button>
      </div>
      <div class="add-form" id="expenseForm">
        <div class="form-group">
          <label>分类名称：</label>
          <input type="text" id="category" placeholder="例如：吃饭、买东西" autocomplete="off">
        </div>
        <div class="form-group">
          <label>金额：</label>
          <input type="number" id="amount" placeholder="消费金额" step="0.01" min="0" inputmode="decimal">
        </div>
        <div class="form-group">
          <label>关联预付款（可选）：</label>
          <select id="advanceSelect">
            <option value="">不使用预付款</option>
          </select>
        </div>
        <div class="form-group">
          <label>备注（可选）：</label>
          <input type="text" id="note" placeholder="例如：好友饭店">
        </div>
        <div class="btn-row">
          <button class="btn-add" id="addExpenseBtn">💸 添加记账</button>
          <button class="btn-clear" id="clearFormBtn">清空</button>
          <button class="btn-attendance" id="openAttendanceBtn">📅 出勤</button>
        </div>
      </div>
      <div class="add-form" id="advanceForm" style="display:none;">
        <div class="form-group">
          <label>预付款名称：</label>
          <input type="text" id="advanceName" placeholder="例如：老板预支">
        </div>
        <div class="form-group">
          <label>金额：</label>
          <input type="number" id="advanceAmount" placeholder="预付款总额" step="0.01" min="0.01">
        </div>
        <div class="form-group">
          <label>到账日期：</label>
          <input type="date" id="advanceDate">
        </div>
        <div class="btn-row">
          <button class="btn-add btn-advance-add" id="addAdvanceBtn">💰 添加预支</button>
          <button class="btn-clear" id="clearFormBtn2">清空</button>
          <button class="btn-attendance" id="openAttendanceBtn2">📅 出勤</button>
        </div>
      </div>
      <div class="add-form" id="incomeForm" style="display:none;">
        <div class="form-group">
          <label>退款到预付款：</label>
          <select id="incomeAdvanceSelect">
            <option value="">请选择预付款</option>
          </select>
        </div>
        <div class="form-group">
          <label>退款金额：</label>
          <input type="number" id="incomeAmount" placeholder="退款金额" step="0.01" min="0" inputmode="decimal">
        </div>
        <div class="form-group">
          <label>备注：</label>
          <input type="text" id="incomeNote" placeholder="例如：退房退款">
        </div>
        <div class="btn-row">
          <button class="btn-add btn-income-add" id="addIncomeBtn">💵 添加收款</button>
          <button class="btn-clear" id="clearIncomeBtn">清空</button>
          <button class="btn-attendance" id="openAttendanceBtn3">📅 出勤</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal" id="attendanceModal">
    <div class="modal-content" style="max-height: 80vh;">
      <div class="modal-header">
        <h3 id="attendanceDateTitle">出勤设置</h3>
        <span class="close" id="closeAttendanceModal">&times;</span>
      </div>
      <div class="form-switch">
        <button id="switchSingle" class="active">👤 单人</button>
        <button id="switchCrew">👥 多人</button>
      </div>

      <div id="singleMode">
        <div class="form-group" style="margin-bottom:8px;">
          <label>项目/老板：</label>
          <input type="text" id="attendanceProject" placeholder="例如：李四">
        </div>
        <div class="attendance-options" id="attendanceOptions">
          <div class="attendance-option" data-type="full">🔵 全天（1天）</div>
          <div class="attendance-option" data-type="half">🟠 半天（0.5天）</div>
          <div class="attendance-option" data-type="overtime">🔴 加班 <input type="number" id="overtimeHours" placeholder="天数" step="0.5" min="0.5"> 天</div>
          <div class="attendance-option" data-type="rest">🟢 休息（不计入）</div>
          <div class="attendance-option" data-type="none">❌ 取消标记</div>
        </div>
        <button id="saveAttendanceBtn" style="width:100%; padding:12px; background:#007aff; color:white; border:none; border-radius:10px; font-size:1rem; margin-top:5px;">保存</button>
      </div>

      <div id="crewMode" style="display:none;">
        <div class="form-group" style="margin-bottom:8px;">
          <label>项目/老板：</label>
          <input type="text" id="crewProject" placeholder="例如：李四">
        </div>
        <div class="batch-bar">
          <input type="checkbox" id="selectAllCrew"> <label for="selectAllCrew">全选</label>
          <button id="batchFull">全天</button>
          <button id="batchHalf">半天</button>
          <button id="batchOvertime">加班</button>
          <button id="batchRest">休息</button>
        </div>
        <table class="crew-table" id="crewTable">
          <thead>
            <tr><th class="check-col"></th><th class="name-col">姓名</th><th>🔵全天</th><th>🟠半天</th><th>🔴加班</th><th>🟢休息</th></tr>
          </thead>
          <tbody id="crewTableBody"></tbody>
        </table>
        <div class="btn-row" style="margin-top:10px;">
          <button id="addCrewMemberBtn" class="btn-add-crew">+ 添加人员</button>
        </div>
        <p id="lockStatus" style="text-align:center; margin-top:5px; color:#888; font-size:0.8rem; cursor:pointer;"></p>
      </div>
    </div>
  </div>

  <div class="modal" id="monthSelectModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>选择要导出的月份</h3>
        <span class="close" id="closeMonthSelect">&times;</span>
      </div>
      <div class="month-list" id="monthList"></div>
      <div class="btn-row" style="margin-top:10px;">
        <button id="selectAllMonths" class="btn-sm" style="background:#6c757d;color:white;">全选</button>
        <button id="deselectAllMonths" class="btn-sm" style="background:#6c757d;color:white;">取消全选</button>
      </div>
      <button id="confirmExportBtn" style="width:100%; padding:12px; background:#007aff; color:white; border:none; border-radius:10px; font-size:1rem; margin-top:10px;">导出所选月份</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'ledger_records';
    const ATTENDANCE_KEY = 'attendance_records';
    const CREW_ATTENDANCE_KEY = 'crew_attendance';
    const CREW_LIST_KEY = 'crew_list';
    const ADVANCE_KEY = 'advance_records';
    const LAST_INPUT_KEY = 'ledger_last_input';

    let currentYear, currentMonth;
    let records = [];
    let attendanceRecords = {};
    let crewAttendance = {};
    let crewList = [];
    let advances = [];
    let selectedDate = null;
    let lastInput = { category: '', note: '' };
    let currentForm = 'expense';
    let crewMode = 'single';
    let crewLockTimer = null;
    let currentSelectedPerson = null;

    // ===== 金额缩略显示函数 =====
    function formatAmount(amount) {
      const absAmount = Math.abs(amount);
      const sign = amount < 0 ? '-' : '';
      if (absAmount >= 10000) {
        return sign + '¥' + (absAmount / 10000).toFixed(1) + 'w';
      } else if (absAmount >= 1000) {
        return sign + '¥' + (absAmount / 1000).toFixed(1) + 'k';
      } else {
        return sign + '¥' + absAmount.toFixed(1);
      }
    }

    function showToast(msg, duration = 2000) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), duration);
    }

    function loadRecords() { const raw = localStorage.getItem(STORAGE_KEY); records = raw ? JSON.parse(raw) : []; }
    function saveRecords() { localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); }
    function loadAttendance() { const raw = localStorage.getItem(ATTENDANCE_KEY); attendanceRecords = raw ? JSON.parse(raw) : {}; }
    function saveAttendance() { localStorage.setItem(ATTENDANCE_KEY, JSON.stringify(attendanceRecords)); }
    function loadCrewList() { const raw = localStorage.getItem(CREW_LIST_KEY); crewList = raw ? JSON.parse(raw) : []; }
    function saveCrewList() { localStorage.setItem(CREW_LIST_KEY, JSON.stringify(crewList)); }
    function loadCrewAttendance() { const raw = localStorage.getItem(CREW_ATTENDANCE_KEY); crewAttendance = raw ? JSON.parse(raw) : {}; }
    function saveCrewAttendance() { localStorage.setItem(CREW_ATTENDANCE_KEY, JSON.stringify(crewAttendance)); }
    function loadAdvances() { const raw = localStorage.getItem(ADVANCE_KEY); advances = raw ? JSON.parse(raw) : []; }
    function saveAdvances() { localStorage.setItem(ADVANCE_KEY, JSON.stringify(advances)); }
    
    function saveLastInput(category, note) {
      lastInput = { category, note };
      localStorage.setItem(LAST_INPUT_KEY, JSON.stringify(lastInput));
    }
    
    function loadLastInput() {
      const raw = localStorage.getItem(LAST_INPUT_KEY);
      lastInput = raw ? JSON.parse(raw) : { category: '', note: '' };
    }

    function updateAdvanceSelect() {
      const select = document.getElementById('advanceSelect');
      select.innerHTML = '';
      const balanceMap = new Map();
      advances.forEach(adv => {
        if (adv.balance > 0) {
          const current = balanceMap.get(adv.name) || 0;
          balanceMap.set(adv.name, current + adv.balance);
        }
      });
      const sortedEntries = Array.from(balanceMap.entries()).sort((a, b) => b[1] - a[1]);
      for (const [name, totalBalance] of sortedEntries) {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = `${name} (余额 ¥${totalBalance.toFixed(2)})`;
        select.appendChild(opt);
      }
      const defaultOpt = document.createElement('option');
      defaultOpt.value = '';
      defaultOpt.textContent = '不使用预付款';
      select.appendChild(defaultOpt);
    }

    function updateIncomeAdvanceSelect() {
      const select = document.getElementById('incomeAdvanceSelect');
      select.innerHTML = '';
      const nameSet = new Set();
      advances.forEach(adv => {
        if (!nameSet.has(adv.name)) {
          nameSet.add(adv.name);
          const totalBalance = advances.filter(a => a.name === adv.name).reduce((sum, a) => sum + a.balance, 0);
          const opt = document.createElement('option');
          opt.value = adv.name;
          opt.textContent = `${adv.name} (余额 ¥${totalBalance.toFixed(2)})`;
          select.appendChild(opt);
        }
      });
      const defaultOpt = document.createElement('option');
      defaultOpt.value = '';
      defaultOpt.textContent = '请选择预付款';
      select.prepend(defaultOpt);
    }

    function getPersonTotalBalance(name) {
      let total = 0;
      advances.forEach(adv => {
        if (adv.name === name && adv.balance > 0) total += adv.balance;
      });
      return total;
    }

    function getPersonTotalOriginal(name) {
      let total = 0;
      advances.forEach(adv => {
        if (adv.name === name) total += adv.amount;
      });
      return total;
    }

    function deductFromPersonPartial(name, amount) {
      const personAdvances = advances.filter(adv => adv.name === name && adv.balance > 0)
        .sort((a, b) => new Date(a.date) - new Date(b.date));
      let remaining = amount;
      let deducted = 0;
      for (let adv of personAdvances) {
        if (remaining <= 0) break;
        const deduct = Math.min(adv.balance, remaining);
        adv.balance -= deduct;
        deducted += deduct;
        remaining -= deduct;
      }
      saveAdvances();
      return deducted;
    }

    function addBackToPerson(name, amount) {
      const personAdvances = advances.filter(adv => adv.name === name)
        .sort((a, b) => new Date(b.date) - new Date(a.date));
      let remaining = amount;
      for (let adv of personAdvances) {
        if (remaining <= 0) break;
        const addBack = Math.min(adv.amount - adv.balance, remaining);
        adv.balance += addBack;
        remaining -= addBack;
      }
      saveAdvances();
      return remaining === 0;
    }

    // ===== 单人考勤按项目分组统计 =====
    function getAttendanceStatsByProject(year, month) {
      const prefix = `${year}-${String(month).padStart(2,'0')}`;
      const stats = {};
      
      Object.entries(attendanceRecords).forEach(([date, att]) => {
        if (date.startsWith(prefix)) {
          const project = att.project || '未分类';
          if (!stats[project]) stats[project] = { full: 0, half: 0, overtime: 0, rest: 0, total: 0 };
          
          if (att.type === 'full') { stats[project].full++; stats[project].total++; }
          else if (att.type === 'half') { stats[project].half += 0.5; stats[project].total += 0.5; }
          else if (att.type === 'overtime') { 
            stats[project].overtime += (att.value || 0); 
            stats[project].total += (att.value || 0); 
          }
          else if (att.type === 'rest') { stats[project].rest++; }
        }
      });
      return stats;
    }

    // ===== 单人考勤修改项目名称 =====
    function renameSingleProject(oldName, newName) {
      newName = newName.trim();
      if (!newName) return alert('项目名称不能为空');
      if (oldName === newName) return;
      
      const stats = getAttendanceStatsByProject(currentYear, currentMonth);
      if (stats[newName]) {
        return alert(`项目 "${newName}" 已存在，请使用其他名称`);
      }
      
      Object.keys(attendanceRecords).forEach(date => {
        if (attendanceRecords[date].project === oldName) {
          attendanceRecords[date].project = newName;
        }
      });
      saveAttendance();
      renderCalendar();
      showToast(`✅ 项目已重命名为 "${newName}"`);
    }

    // ===== 多人考勤按项目分组统计 =====
    function getCrewStatsByProject(year, month) {
      const prefix = `${year}-${String(month).padStart(2,'0')}`;
      const stats = {};
      
      Object.entries(crewAttendance).forEach(([date, dayData]) => {
        if (date.startsWith(prefix)) {
          Object.entries(dayData).forEach(([name, val]) => {
            const project = val.project || '未分类';
            if (!stats[project]) stats[project] = {};
            if (!stats[project][name]) stats[project][name] = { full: 0, half: 0, overtime: 0, rest: 0, total: 0 };
            
            const type = val.type || val;
            const days = val.days !== undefined ? val.days : 1;
            const memberStats = stats[project][name];
            if (type === 'full') { memberStats.full++; memberStats.total++; }
            else if (type === 'half') { memberStats.half++; memberStats.total += 0.5; }
            else if (type === 'overtime') { memberStats.overtime += days; memberStats.total += days; }
            else if (type === 'rest') { memberStats.rest++; }
          });
        }
      });
      return stats;
    }

    // ===== 多人考勤修改项目名称 =====
    function renameCrewProject(oldName, newName) {
      newName = newName.trim();
      if (!newName) return alert('项目名称不能为空');
      if (oldName === newName) return;
      
      const stats = getCrewStatsByProject(currentYear, currentMonth);
      if (stats[newName]) {
        return alert(`项目 "${newName}" 已存在，请使用其他名称`);
      }
      
      Object.keys(crewAttendance).forEach(date => {
        Object.keys(crewAttendance[date]).forEach(name => {
          if (crewAttendance[date][name].project === oldName) {
            crewAttendance[date][name].project = newName;
          }
        });
      });
      saveCrewAttendance();
      renderCalendar();
      showToast(`✅ 项目已重命名为 "${newName}"`);
    }

    // ===== 获取某天某项目的出勤人数（多人） =====
    function getCrewCountByProject(dateStr, project) {
      const dayData = crewAttendance[dateStr];
      if (!dayData) return 0;
      let count = 0;
      Object.keys(dayData).forEach(name => {
        const val = dayData[name];
        const type = val.type || val;
        const valProject = val.project || '未分类';
        if (valProject === project && type !== 'rest' && type !== 'none') {
          count++;
        }
      });
      return count;
    }

    function getSingleAttendanceInfo(dateStr) {
      const att = attendanceRecords[dateStr];
      if (!att) return null;
      return { type: att.type };
    }

    function hasCrewAttendance(dateStr) {
      const dayData = crewAttendance[dateStr];
      if (!dayData) return false;
      return Object.keys(dayData).some(name => {
        const val = dayData[name];
        const type = val.type || val;
        return type !== 'rest' && type !== 'none';
      });
    }

    function deleteCrewMember(name) {
      if (confirm(`确定要删除人员 "${name}" 吗？该人员的所有出勤记录也会被删除。`)) {
        crewList = crewList.filter(n => n !== name);
        saveCrewList();
        Object.keys(crewAttendance).forEach(date => {
          if (crewAttendance[date][name]) {
            delete crewAttendance[date][name];
            if (Object.keys(crewAttendance[date]).length === 0) delete crewAttendance[date];
          }
        });
        saveCrewAttendance();
        if (document.getElementById('crewMode').style.display !== 'none') renderCrewTable();
        resetCrewLock();
        renderCalendar();
        showToast(`✅ 已删除 ${name}`);
      }
    }

    function editCrewMember(oldName) {
      const newName = prompt('请输入新的姓名：', oldName);
      if (newName && newName.trim() && newName.trim() !== oldName) {
        const newNameTrimmed = newName.trim();
        if (crewList.includes(newNameTrimmed)) {
          alert('该姓名已存在！');
          return;
        }
        const index = crewList.indexOf(oldName);
        if (index !== -1) crewList[index] = newNameTrimmed;
        saveCrewList();
        const newCrewAttendance = {};
        Object.entries(crewAttendance).forEach(([date, dayData]) => {
          newCrewAttendance[date] = {};
          Object.entries(dayData).forEach(([name, val]) => {
            const newNameKey = name === oldName ? newNameTrimmed : name;
            newCrewAttendance[date][newNameKey] = val;
          });
        });
        crewAttendance = newCrewAttendance;
        saveCrewAttendance();
        if (document.getElementById('crewMode').style.display !== 'none') renderCrewTable();
        resetCrewLock();
        renderCalendar();
        showToast(`✅ 已重命名为 ${newNameTrimmed}`);
      }
    }

    function openPersonMenu(name) {
      currentSelectedPerson = name;
      document.getElementById('personMenuName').textContent = name;
      document.getElementById('personMenuModal').classList.add('active');
    }

    function closePersonMenu() {
      document.getElementById('personMenuModal').classList.remove('active');
      currentSelectedPerson = null;
    }

    function getAdvancesByDate(dateStr) { return advances.filter(adv => adv.date === dateStr); }
    function getCrewCountByDate(dateStr) {
      const dayData = crewAttendance[dateStr];
      if (!dayData) return 0;
      return Object.keys(dayData).filter(name => {
        const val = dayData[name];
        return val && val.type !== 'rest' && val.type !== 'none';
      }).length;
    }

    function getRecordsByDate(dateStr) { return records.filter(r => r.date === dateStr); }
    function getRecordsByMonth(year, month) { const prefix = `${year}-${String(month).padStart(2,'0')}`; return records.filter(r => r.date.startsWith(prefix)); }
    function getDayTotal(dateStr) { return getRecordsByDate(dateStr).reduce((sum, r) => sum + r.amount, 0); }
    function getAttendanceByDate(dateStr) { return attendanceRecords[dateStr] || null; }

    function getDetailedSummary(year, month) {
      const monthRecords = getRecordsByMonth(year, month);
      const summary = {};
      monthRecords.forEach(r => {
        if (!summary[r.category]) summary[r.category] = { total: 0, records: [] };
        summary[r.category].total += r.amount;
        const day = parseInt(r.date.split('-')[2]);
        summary[r.category].records.push({ day, amount: r.amount, note: r.note, date: r.date });
      });
      Object.values(summary).forEach(cat => cat.records.sort((a, b) => a.day - b.day));
      return summary;
    }

    function renameCategory(oldName, newName) {
      newName = newName.trim();
      if (!newName) return alert('分类名不能为空');
      if (oldName === newName) return;
      if (getRecordsByMonth(currentYear, currentMonth).some(r => r.category === newName)) return alert(`"${newName}" 已存在`);
      records.forEach(r => { if (r.category === oldName) r.category = newName; });
      saveRecords();
      renderCalendar();
    }

    function renderCalendar() {
      document.getElementById('monthTitle').textContent = `${currentYear}年 ${currentMonth}月`;
      const firstDay = new Date(currentYear, currentMonth - 1, 1);
      const startDay = firstDay.getDay();
      const prev = startDay;
      const totalCells = 42;
      const cal = document.getElementById('calendar');
      cal.innerHTML = '';
      ['日','一','二','三','四','五','六'].forEach(d => {
        const label = document.createElement('div'); label.className = 'day-label'; label.textContent = d; cal.appendChild(label);
      });
      const today = new Date();
      const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
      for (let i = 0; i < totalCells; i++) {
        const offset = i - prev + 1;
        const cellDate = new Date(currentYear, currentMonth - 1, offset);
        const cellMonth = cellDate.getMonth() + 1;
        const cellYear = cellDate.getFullYear();
        const dateStr = `${cellYear}-${String(cellMonth).padStart(2,'0')}-${String(cellDate.getDate()).padStart(2,'0')}`;
        const cell = document.createElement('div');
        if (cellMonth !== currentMonth) { cell.className = 'day-cell empty'; }
        else {
          cell.className = 'day-cell';
          const content = document.createElement('div'); content.className = 'cell-content';
          
          const singleInfo = getSingleAttendanceInfo(dateStr);
          const hasCrew = hasCrewAttendance(dateStr);
          if (singleInfo || hasCrew) {
            const dotsDiv = document.createElement('div');
            dotsDiv.className = 'attendance-dots';
            if (singleInfo) {
              const dot = document.createElement('span');
              dot.className = `attendance-dot ${singleInfo.type}`;
              dotsDiv.appendChild(dot);
            }
            if (hasCrew) {
              const crewDot = document.createElement('span');
              crewDot.className = 'attendance-dot crew';
              dotsDiv.appendChild(crewDot);
            }
            content.appendChild(dotsDiv);
          } else {
            const placeholder = document.createElement('div');
            placeholder.style.height = '14px';
            content.appendChild(placeholder);
          }
          
          const dateSpan = document.createElement('span');
          dateSpan.textContent = cellDate.getDate();
          dateSpan.style.fontWeight = '500';
          content.appendChild(dateSpan);
          if (dateStr === todayStr) cell.classList.add('today');
          
          const total = getDayTotal(dateStr);
          if (total !== 0) {
            cell.classList.add('has-record');
            const amtSpan = document.createElement('span');
            amtSpan.className = 'amount';
            // 使用缩略显示
            const formatted = formatAmount(total);
            if (total < 0) {
              amtSpan.classList.add('negative');
            } else {
              amtSpan.classList.add('positive');
            }
            amtSpan.textContent = formatted;
            content.appendChild(amtSpan);
          } else {
            const placeholder = document.createElement('div');
            placeholder.style.height = '16px';
            content.appendChild(placeholder);
          }
          
          cell.appendChild(content);
          cell.addEventListener('click', () => openModal(dateStr));
        }
        cal.appendChild(cell);
      }
      renderSummary();
    }

    function renderSummary() {
      const container = document.getElementById('summaryContent');
      const summary = getDetailedSummary(currentYear, currentMonth);
      const cats = Object.keys(summary);
      let html = '';
      if (cats.length === 0) { html += '<p style="color:#888;">这个月还没有消费记录</p>'; }
      else {
        cats.sort((a,b) => summary[b].total - summary[a].total);
        let grandTotal = 0;
        cats.forEach((cat, i) => {
          const data = summary[cat]; grandTotal += data.total;
          const days = [...new Set(data.records.map(r => r.day))].sort((a,b)=>a-b);
          const daysHtml = days.map(d => `<span>${d}号</span>`).join('');
          let totalDisplay = '';
          if (data.total < 0) {
            totalDisplay = `-¥${Math.abs(data.total).toFixed(2)}`;
          } else {
            totalDisplay = `+¥${data.total.toFixed(2)}`;
          }
          const cls = data.total < 0 ? 'negative' : 'positive';
          html += `<div class="summary-category"><div class="summary-category-header"><div class="summary-category-name-row"><span class="summary-category-name" id="catName_${i}">${cat}</span><span class="edit-category-row" id="editRow_${i}" style="display:none;"><input type="text" id="editInput_${i}" value="${cat}"><button class="btn-sm btn-edit-confirm" onclick="confirmRename('${cat}',${i})">✓</button><button class="btn-sm btn-edit-cancel" onclick="cancelEdit(${i})">✕</button></span></div><span class="summary-category-amount ${cls}">${totalDisplay}</span></div><div class="summary-category-days">${daysHtml}</div><div style="margin-top:6px;"><button class="btn-sm btn-edit" onclick="startEdit(${i})">✏️ 改名</button><button class="btn-sm btn-export" onclick="event.stopPropagation(); exportCategoryToImage('${cat}')">📷 导出</button></div></div>`;
        });
        let grandDisplay = grandTotal < 0 ? `-¥${Math.abs(grandTotal).toFixed(2)}` : `+¥${grandTotal.toFixed(2)}`;
        html += `<div class="summary-total"><span>本月合计</span><span>${grandDisplay}</span></div>`;
      }

      if (advances.length > 0) {
        const personMap = new Map();
        let totalOriginalAll = 0;
        advances.forEach(adv => {
          if (!personMap.has(adv.name)) personMap.set(adv.name, { records: [], totalBalance: 0, totalOriginal: 0 });
          const person = personMap.get(adv.name);
          person.records.push({ date: adv.date, amount: adv.amount, balance: adv.balance });
          person.totalBalance += adv.balance;
          person.totalOriginal += adv.amount;
          totalOriginalAll += adv.amount;
        });
        html += `<div class="advance-card"><div style="display:flex; justify-content:space-between; align-items:center;"><h4>💰 预付款余额</h4><span style="font-weight:bold; color:#e65100;">¥${totalOriginalAll.toFixed(2)}</span></div>`;
        for (const [name, person] of personMap) {
          html += `<div style="margin-top:12px;"><div style="font-weight:bold; margin-bottom:5px;">${name}</div>`;
          person.records.forEach(rec => {
            html += `<div style="display:flex; justify-content:space-between; font-size:0.8rem; color:#666; margin-left:8px;"><span>到账：${rec.date || '未知日期'}</span><span>总额 ¥${rec.amount.toFixed(2)}</span></div>`;
          });
          html += `<div style="display:flex; justify-content:space-between; margin-top:5px; padding-top:3px; border-top:1px dashed #ffe0b2; font-weight:bold;"><span>剩余余额</span><span style="color:#e65100;">¥${person.totalBalance.toFixed(2)}</span></div></div>`;
        }
        html += `</div>`;
      }

      // ===== 单人出勤统计（按项目分组，带修改名称按钮） =====
      const projectStats = getAttendanceStatsByProject(currentYear, currentMonth);
      const projectNames = Object.keys(projectStats);
      let hasSingleData = projectNames.some(name => {
        const s = projectStats[name];
        return s.total > 0 || s.rest > 0;
      });

      if (hasSingleData) {
        html += `<div class="attendance-stats"><h4><span>📅 本月出勤统计（单人）</span></h4>`;
        let grandTotal = 0;
        projectNames.forEach(name => {
          const s = projectStats[name];
          if (s.total > 0 || s.rest > 0) {
            grandTotal += s.total;
            html += `<div style="margin-top:8px;padding:8px;background:#f0f4ff;border-radius:6px;">
              <div style="font-weight:bold;color:#007aff;display:flex;justify-content:space-between;align-items:center;">
                <span>【${name}】</span>
                <button class="btn-sm btn-edit" onclick="renameSingleProject('${name}')" style="font-size:0.7rem;">✏️ 改名称</button>
              </div>
              <div class="stat-row"><span>🔵 全天</span><span>${s.full} 天</span></div>
              <div class="stat-row"><span>🟠 半天</span><span>${s.half} 天</span></div>
              <div class="stat-row"><span>🔴 加班</span><span>${s.overtime.toFixed(1)} 天</span></div>
              <div class="stat-row"><span>🟢 休息</span><span>${s.rest} 天</span></div>
              <div class="stat-row" style="font-weight:bold;"><span>📌 合计出勤</span><span>${s.total.toFixed(1)} 天</span></div>
            </div>`;
          }
        });
        html += `<div class="stat-row" style="font-weight:bold;border-top:2px solid #007aff;padding-top:8px;margin-top:8px;"><span>📌 总计</span><span>${grandTotal.toFixed(1)} 天</span></div>`;
        html += `</div>`;
      }

      // ===== 多人出勤统计（按项目分组，每个项目独立显示今天出勤人数） =====
      const crewStatsByProject = getCrewStatsByProject(currentYear, currentMonth);
      const crewProjectNames = Object.keys(crewStatsByProject);
      const hasCrewData = crewProjectNames.length > 0 && crewList.length > 0;

      if (hasCrewData || crewList.length > 0) {
        html += `<div class="attendance-stats" style="background:#e3f2fd;"><h4>👥 多人出勤统计 <span class="attendance-dot crew" style="display:inline-block; width:10px; height:10px; vertical-align:middle;"></span></h4>`;
        let grandTotalCrew = 0;
        if (hasCrewData) {
          const todayStr = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(new Date().getDate()).padStart(2,'0')}`;
          crewProjectNames.forEach(project => {
            const members = crewStatsByProject[project];
            const memberNames = Object.keys(members);
            if (memberNames.length > 0) {
              let projectTotal = 0;
              const todayCrewCount = getCrewCountByProject(todayStr, project);
              html += `<div style="margin-top:8px;padding:8px;background:#f0f4ff;border-radius:6px;">
                <div style="font-weight:bold;color:#007aff;display:flex;justify-content:space-between;align-items:center;">
                  <span>【${project}】</span>
                  <button class="btn-sm btn-edit" onclick="renameCrewProject('${project}')" style="font-size:0.7rem;">✏️ 改名称</button>
                </div>`;
              memberNames.forEach(name => {
                const s = members[name];
                projectTotal += s.total;
                html += `<div class="stat-row"><span>${name}</span><span>🔵${s.full}天 🟠${(s.half/2).toFixed(1)}天 🔴${s.overtime.toFixed(1)}天 合计${s.total.toFixed(1)}天</span></div>`;
              });
              html += `<div class="stat-row" style="font-weight:bold;border-top:1px solid #ccc;padding-top:4px;"><span>📌 今天出勤</span><span>👥 ${todayCrewCount} 人</span></div>`;
              html += `<div class="stat-row" style="font-weight:bold;"><span>📌 总计</span><span>${projectTotal.toFixed(1)} 天</span></div>`;
              html += `</div>`;
              grandTotalCrew += projectTotal;
            }
          });
        } else {
          html += `<div style="color:#888;padding:8px;text-align:center;">暂无出勤记录</div>`;
        }
        html += `</div>`;
      }
      container.innerHTML = html;
    }

    function renderAllRecords() {
      const container = document.getElementById('modalRecords');
      const dayRecs = getRecordsByDate(selectedDate);
      const dayAdvances = getAdvancesByDate(selectedDate);
      const dayIncomes = dayRecs.filter(r => r.amount > 0);
      const dayExpenses = dayRecs.filter(r => r.amount < 0);
      
      const allItems = [
        ...dayAdvances.map(adv => ({ type: 'advance', data: adv, timestamp: adv.id })),
        ...dayIncomes.map(inc => ({ type: 'income', data: inc, timestamp: inc.id })),
        ...dayExpenses.map(exp => ({ type: 'expense', data: exp, timestamp: exp.id }))
      ].sort((a, b) => b.timestamp - a.timestamp);
      
      if (allItems.length === 0) { container.innerHTML = '<p style="color:#888;text-align:center;padding:10px;">当天暂无记录</p>'; return; }
      
      container.innerHTML = allItems.map(item => {
        if (item.type === 'advance') {
          const adv = item.data;
          const used = adv.amount - adv.balance;
          return `<div class="record-item"><div class="info"><strong>💰 预支 - ${adv.name}</strong><small>总额 ¥${adv.amount.toFixed(2)} | 已用 ¥${used.toFixed(2)} | 余额 ¥${adv.balance.toFixed(2)}</small></div><span class="amount-text advance">+¥${adv.amount.toFixed(2)}</span><button class="delete-btn" data-id="${adv.id}" data-type="advance">×</button></div>`;
        } else if (item.type === 'income') {
          const r = item.data;
          const advanceInfo = r.advancePerson ? ` (退款到 ${r.advancePerson})` : '';
          return `<div class="record-item"><div class="info"><strong>💵 退款 - ${r.category || r.advancePerson}</strong>${r.note ? `<small>${r.note}${advanceInfo}</small>` : `<small>${advanceInfo}</small>`}</div><span class="amount-text income">+¥${r.amount.toFixed(2)}</span><button class="delete-btn" data-id="${r.id}" data-type="expense">×</button></div>`;
        } else {
          const r = item.data;
          const cls = r.amount < 0 ? 'negative' : 'positive';
          const disp = r.amount < 0 ? `-¥${Math.abs(r.amount).toFixed(2)}` : `¥${r.amount.toFixed(2)}`;
          const extraInfo = r.splitAmount ? `<small>💡 其中 ¥${r.splitAmount.toFixed(2)} 使用预付款</small>` : '';
          return `<div class="record-item"><div class="info"><strong>💸 ${r.category}</strong>${r.note ? `<small>${r.note}</small>` : ''}${extraInfo}</div><span class="amount-text ${cls}">${disp}</span><button class="delete-btn" data-id="${r.id}" data-type="expense">×</button></div>`;
        }
      }).join('');
      
      container.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = parseInt(btn.dataset.id);
          const type = btn.dataset.type;
          if (type === 'expense') {
            const record = records.find(r => r.id === id);
            if (record && record.advancePerson && record.advancePerson !== '') {
              if (record.amount > 0) {
                deductFromPersonPartial(record.advancePerson, Math.abs(record.amount));
              } else {
                addBackToPerson(record.advancePerson, Math.abs(record.amount));
              }
            }
            records = records.filter(r => r.id !== id);
            saveRecords();
            updateAdvanceSelect();
            updateIncomeAdvanceSelect();
          } else if (type === 'advance') {
            advances = advances.filter(a => a.id !== id);
            saveAdvances();
            updateAdvanceSelect();
            updateIncomeAdvanceSelect();
          }
          renderAllRecords();
          renderCalendar();
          showToast('✅ 已删除');
        });
      });
    }

    function addExpense() {
      if (!selectedDate) return;
      const category = document.getElementById('category').value.trim();
      let amount = parseFloat(document.getElementById('amount').value);
      const note = document.getElementById('note').value.trim();
      const advancePerson = document.getElementById('advanceSelect').value;
      
      if (!category) return alert('请输入分类名称');
      if (isNaN(amount) || amount <= 0) return alert('请输入有效金额');
      
      saveLastInput(category, note);
      
      const recordsToAdd = [];
      
      if (advancePerson && advancePerson !== '') {
        const totalBalance = getPersonTotalBalance(advancePerson);
        if (totalBalance > 0) {
          const deducted = deductFromPersonPartial(advancePerson, amount);
          if (deducted > 0) {
            recordsToAdd.push({
              id: Date.now(),
              date: selectedDate,
              category,
              amount: -deducted,
              note: note + (deducted < amount ? ` (使用预付款¥${deducted.toFixed(2)})` : ''),
              advancePerson: advancePerson,
              splitAmount: deducted
            });
            amount -= deducted;
            if (amount > 0) {
              showToast(`预付款不足，剩余 ¥${amount.toFixed(2)} 使用现金支付`, 3000);
            }
          }
        }
      }
      
      if (amount > 0) {
        recordsToAdd.push({
          id: Date.now() + 1,
          date: selectedDate,
          category,
          amount: -amount,
          note: note + (advancePerson ? ` (现金支付¥${amount.toFixed(2)})` : ''),
          advancePerson: null,
          splitAmount: null
        });
      }
      
      records.push(...recordsToAdd);
      saveRecords();
      
      document.getElementById('amount').value = '';
      updateAdvanceSelect();
      updateIncomeAdvanceSelect();
      renderAllRecords();
      renderCalendar();
      showToast('✅ 记账已保存');
    }

    function addAdvance() {
      if (!selectedDate) return;
      const name = document.getElementById('advanceName').value.trim();
      const amount = parseFloat(document.getElementById('advanceAmount').value);
      const date = document.getElementById('advanceDate').value;
      if (!name) return alert('请输入预付款名称');
      if (isNaN(amount) || amount <= 0) return alert('请输入有效金额');
      advances.push({ id: Date.now(), name, amount, balance: amount, date: date || selectedDate });
      saveAdvances();
      document.getElementById('advanceName').value = '';
      document.getElementById('advanceAmount').value = '';
      updateAdvanceSelect();
      updateIncomeAdvanceSelect();
      renderAllRecords();
      renderCalendar();
      showToast('✅ 预支已添加');
    }

    function addIncome() {
      if (!selectedDate) return;
      const advancePerson = document.getElementById('incomeAdvanceSelect').value;
      const amount = parseFloat(document.getElementById('incomeAmount').value);
      const note = document.getElementById('incomeNote').value.trim();
      
      if (!advancePerson) return alert('请选择要退款的预付款');
      if (isNaN(amount) || amount <= 0) return alert('请输入有效金额');
      
      const personAdvances = advances.filter(adv => adv.name === advancePerson);
      if (personAdvances.length === 0) {
        return alert(`没有找到 "${advancePerson}" 的预付款记录`);
      }
      
      const totalOriginal = personAdvances.reduce((sum, adv) => sum + adv.amount, 0);
      const totalBalance = personAdvances.reduce((sum, adv) => sum + adv.balance, 0);
      const usedAmount = totalOriginal - totalBalance;
      
      if (amount > usedAmount) {
        return alert(`只能退回最多 ¥${usedAmount.toFixed(2)}（${advancePerson} 已消费 ${usedAmount.toFixed(2)}），超出部分无法退回`);
      }
      
      const success = addBackToPerson(advancePerson, amount);
      
      if (!success) {
        return alert('退款失败，请稍后重试');
      }
      
      records.push({
        id: Date.now(),
        date: selectedDate,
        category: `退款-${advancePerson}`,
        amount: Math.abs(amount),
        note: note || `退款到 ${advancePerson}`,
        advancePerson: advancePerson,
        splitAmount: null
      });
      saveRecords();
      
      document.getElementById('incomeAmount').value = '';
      document.getElementById('incomeNote').value = '';
      updateAdvanceSelect();
      updateIncomeAdvanceSelect();
      renderAllRecords();
      renderCalendar();
      showToast(`✅ 已退款 ¥${amount.toFixed(2)} 到 ${advancePerson}，当前余额 ¥${getPersonTotalBalance(advancePerson).toFixed(2)}`);
    }

    function setCrewAttendanceSimple(name, type, project) {

        delete crewAttendance[selectedDate][name];

    function renderCrewTable() {

        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:20px;color:#888;">暂无人员，点击下方按钮添加</td></tr>';
        return;
      }
      tbody.innerHTML = crewList.map(name => {
        const currentVal = dayData[name];
        let type = null, overtimeDays = null;
        if (currentVal) {
          if (typeof currentVal === 'object') { type = currentVal.type; overtimeDays = currentVal.days; }
          else { type = currentVal; }
        }
        const fullSelected = type === 'full';
        const halfSelected = type === 'half';
        const overtimeSelected = type === 'overtime';
        const restSelected = type === 'rest';
        const overtimeDisplay = overtimeSelected && overtimeDays ? overtimeDays.toFixed(1) : '';
        return `<tr>
          <td class="check-col"><input type="checkbox" class="crew-check" data-name="${name}"></td>
          <td class="name-col" data-name="${name}">${name}</td>
          <td class="clickable ${fullSelected ? 'selected' : ''}" data-type="full" data-name="${name}">${fullSelected ? '●' : ''}</td>
          <td class="clickable ${halfSelected ? 'selected' : ''}" data-type="half" data-name="${name}">${halfSelected ? '●' : ''}</td>
          <td class="overtime-cell ${overtimeSelected ? 'selected' : ''}" data-type="overtime" data-name="${name}">${overtimeDisplay}</td>

          let currentDays = 1;
          if (currentVal && currentVal.type === 'overtime') currentDays = currentVal.days || 1;
          const newDays = prompt('请输入加班天数（如 1.5 表示一天半）：', currentDays);

    function getAvailableMonths() {
      const months = new Set();
      records.forEach(r => { const p = r.date.split('-'); if (p.length >= 2) months.add(`${p[0]}-${p[1]}`); });
      Object.keys(attendanceRecords).forEach(date => { const p = date.split('-'); if (p.length >= 2) months.add(`${p[0]}-${p[1]}`); });
      Object.keys(crewAttendance).forEach(date => { const p = date.split('-'); if (p.length >= 2) months.add(`${p[0]}-${p[1]}`); });
      advances.forEach(adv => { if (adv.date) { const p = adv.date.split('-'); if (p.length >= 2) months.add(`${p[0]}-${p[1]}`); } });
      if (months.size === 0) { const y = new Date().getFullYear(); for (let m = 1; m <= 12; m++) months.add(`${y}-${String(m).padStart(2,'0')}`); }
      return Array.from(months).sort();
    }

    function exportSelectedMonths(selectedMonths) {
      if (!selectedMonths.length) return alert('请选择月份');
      const fRecords = records.filter(r => selectedMonths.includes(`${r.date.split('-')[0]}-${r.date.split('-')[1]}`));
      const fAttendance = {};
      Object.entries(attendanceRecords).forEach(([date, att]) => { if (selectedMonths.includes(`${date.split('-')[0]}-${date.split('-')[1]}`)) fAttendance[date] = att; });
      const fCrewAttendance = {};
      Object.entries(crewAttendance).forEach(([date, dayData]) => { if (selectedMonths.includes(`${date.split('-')[0]}-${date.split('-')[1]}`)) fCrewAttendance[date] = dayData; });
      const fAdvances = advances.filter(adv => adv.date && selectedMonths.includes(`${adv.date.split('-')[0]}-${adv.date.split('-')[1]}`));
      const data = { version: 3, exportTime: new Date().toISOString(), records: fRecords, attendance: fAttendance, crewAttendance: fCrewAttendance, crewList, advances: fAdvances };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const a = document.createElement('a'); a.download = `记账备份_${selectedMonths.join('_')}.json`; a.href = URL.createObjectURL(blob);
      document.body.appendChild(a); a.click();
      setTimeout(() => { document.body.removeChild(a); }, 200);
      showToast(`✅ 已导出 ${fRecords.length} 条记录，${fAdvances.length} 条预支`);
    }

    function importData(file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          if (confirm('确定替换现有数据？取消则合并')) {
            records = data.records || [];
            attendanceRecords = data.attendance || {};
            crewAttendance = data.crewAttendance || {};
            crewList = data.crewList || [];
            advances = data.advances || [];
          } else {
            const ids = new Set(records.map(r => r.id));
            records = [...records, ...(data.records||[]).filter(r => !ids.has(r.id))];
            if (data.attendance) Object.assign(attendanceRecords, data.attendance);
            if (data.crewAttendance) Object.assign(crewAttendance, data.crewAttendance);
            if (data.crewList) { const cSet = new Set(crewList); crewList = [...crewList, ...data.crewList.filter(n => !cSet.has(n))]; }
            if (data.advances) { const aIds = new Set(advances.map(a => a.id)); advances = [...advances, ...data.advances.filter(a => !aIds.has(a.id))]; }
          }
          saveRecords(); saveAttendance(); saveCrewAttendance(); saveCrewList(); saveAdvances();
          renderCalendar(); updateAdvanceSelect(); updateIncomeAdvanceSelect();
          showToast('✅ 导入成功');
        } catch (err) { alert('导入失败'); }
      };
      reader.readAsText(file);
    }

    async function exportCategoryToImage(cat) {
      const data = getDetailedSummary(currentYear, currentMonth)[cat];
      if (!data) return alert('无记录');
      document.getElementById('loadingOverlay').classList.add('active');
      const ms = `${currentYear}年${currentMonth}月`;
      let inner = `<div class="export-area"><div class="export-title">📌 ${cat}</div><div class="export-subtitle">${ms} 消费明细</div><div class="export-category">`;
      data.records.forEach(r => {
        const sign = r.amount < 0 ? '-' : '+';
        const absAmt = Math.abs(r.amount);
        inner += `<div class="export-detail-item"><span><span class="detail-date">${r.day}号</span>${r.note?`<span class="detail-note"> - ${r.note}</span>`:''}</span><span class="detail-amount ${r.amount<0?'negative':'positive'}">${sign}¥${absAmt.toFixed(2)}</span></div>`;
      });
      inner += `<div class="export-category-total"><span>小计</span><span class="detail-amount ${data.total<0?'negative':'positive'}">${data.total<0?'-¥'+Math.abs(data.total).toFixed(2):'+¥'+data.total.toFixed(2)}</span></div></div><div style="text-align:center;margin-top:15px;color:#999;font-size:0.75rem;">导出时间：${new Date().toLocaleString()}</div></div>`;
      document.getElementById('exportTemplate').innerHTML = inner;
      try {
        const canvas = await html2canvas(document.querySelector('.export-area'), { backgroundColor: '#fff', scale: 2 });
        const a = document.createElement('a'); a.download = `${cat}_${ms}.png`; a.href = canvas.toDataURL('image/png'); a.click();
      } catch (e) { alert('导出失败'); }
      document.getElementById('loadingOverlay').classList.remove('active');
    }

    async function exportAttendanceToImage() {
      const projectStats = getAttendanceStatsByProject(currentYear, currentMonth);
      const ms = `${currentYear}年${currentMonth}月`;
      const div = document.createElement('div');
      div.style.cssText = 'padding:20px;background:white;font-family:system-ui;width:400px;';
      
      let inner = `<h3 style="text-align:center;margin-bottom:10px;">📅 ${ms} 出勤统计（单人）</h3>`;
      let grandTotal = 0;
      const projectNames = Object.keys(projectStats);
      projectNames.forEach(name => {
        const s = projectStats[name];
        if (s.total > 0 || s.rest > 0) {
          grandTotal += s.total;
          inner += `<div style="background:#f0f4ff;padding:12px;border-radius:8px;margin-bottom:10px;">
            <div style="font-weight:bold;color:#007aff;margin-bottom:5px;">【${name}】</div>
            <div style="display:flex;justify-content:space-between;margin:3px 0;"><span>🔵 全天</span><span>${s.full} 天</span></div>
            <div style="display:flex;justify-content:space-between;margin:3px 0;"><span>🟠 半天</span><span>${s.half} 天</span></div>
            <div style="display:flex;justify-content:space-between;margin:3px 0;"><span>🔴 加班</span><span>${s.overtime.toFixed(1)} 天</span></div>
            <div style="display:flex;justify-content:space-between;margin:3px 0;"><span>🟢 休息</span><span>${s.rest} 天</span></div>
            <div style="display:flex;justify-content:space-between;margin:3px 0;font-weight:bold;border-top:1px solid #ccc;padding-top:3px;"><span>📌 合计出勤</span><span>${s.total.toFixed(1)} 天</span></div>
          </div>`;
        }
      });
      inner += `<div style="font-weight:bold;border-top:2px solid #007aff;padding-top:8px;margin-top:8px;display:flex;justify-content:space-between;"><span>📌 总计</span><span>${grandTotal.toFixed(1)} 天</span></div>`;
      inner += `<div style="text-align:center;margin-top:15px;color:#999;font-size:0.75rem;">导出时间：${new Date().toLocaleString()}</div>`;
      
      div.innerHTML = inner;
      document.body.appendChild(div);
      try {
        const canvas = await html2canvas(div, { backgroundColor: '#fff', scale: 2 });
        const a = document.createElement('a'); a.download = `出勤统计_${ms}.png`; a.href = canvas.toDataURL('image/png'); a.click();
      } catch (e) { alert('导出失败'); }
      document.body.removeChild(div);
    }

    document.getElementById('exportDataBtn').addEventListener('click', () => {
      document.getElementById('monthList').innerHTML = getAvailableMonths().map(m => { const [y, mo] = m.split('-'); return `<div class="month-item"><input type="checkbox" id="chk_${m}" value="${m}" checked><label for="chk_${m}">${y}年${mo}月</label></div>`; }).join('');
      document.getElementById('monthSelectModal').classList.add('active');
    });
    document.getElementById('closeMonthSelect').addEventListener('click', () => document.getElementById('monthSelectModal').classList.remove('active'));
    document.getElementById('selectAllMonths').addEventListener('click', () => document.querySelectorAll('#monthList input[type="checkbox"]').forEach(cb => cb.checked = true));
    document.getElementById('deselectAllMonths').addEventListener('click', () => document.querySelectorAll('#monthList input[type="checkbox"]').forEach(cb => cb.checked = false));
    document.getElementById('confirmExportBtn').addEventListener('click', () => {
      const checked = Array.from(document.querySelectorAll('#monthList input[type="checkbox"]:checked')).map(cb => cb.value);
      document.getElementById('monthSelectModal').classList.remove('active');
      exportSelectedMonths(checked);
    });

    document.getElementById('importDataBtn').addEventListener('click', () => document.getElementById('importFileInput').click());
    document.getElementById('importFileInput').addEventListener('change', e => { if (e.target.files[0]) { importData(e.target.files[0]); e.target.value = ''; } });

    let confirmCb = null;
    document.getElementById('clearAllBtn').addEventListener('click', () => {
      document.getElementById('confirmMessage').textContent = '确定清空所有数据？';
      confirmCb = () => { records = []; attendanceRecords = {}; crewAttendance = {}; advances = []; saveRecords(); saveAttendance(); saveCrewAttendance(); saveAdvances(); renderCalendar(); showToast('🗑️ 已清空'); };
      document.getElementById('confirmDialog').classList.add('active');
    });
    document.getElementById('confirmCancel').addEventListener('click', () => document.getElementById('confirmDialog').classList.remove('active'));
    document.getElementById('confirmOk').addEventListener('click', () => { document.getElementById('confirmDialog').classList.remove('active'); if (confirmCb) confirmCb(); });

    document.getElementById('prevMonth').addEventListener('click', () => { if (currentMonth===1) { currentMonth=12; currentYear--; } else currentMonth--; renderCalendar(); });
    document.getElementById('nextMonth').addEventListener('click', () => { if (currentMonth===12) { currentMonth=1; currentYear++; } else currentMonth++; renderCalendar(); });

    window.startEdit = i => { document.getElementById(`catName_${i}`).style.display='none'; document.getElementById(`editRow_${i}`).style.display='flex'; document.getElementById(`editInput_${i}`).focus(); };
    window.cancelEdit = i => { document.getElementById(`catName_${i}`).style.display='inline'; document.getElementById(`editRow_${i}`).style.display='none'; };
    window.confirmRename = (old, i) => renameCategory(old, document.getElementById(`editInput_${i}`).value);
    window.exportCategoryToImage = exportCategoryToImage;

    // 初始化
    const now = new Date();
    currentYear = now.getFullYear();
    currentMonth = now.getMonth() + 1;
    loadRecords();
    loadAttendance();
    loadCrewList();
    loadCrewAttendance();
    loadAdvances();
    loadLastInput();
    renderCalendar();
    updateAdvanceSelect();
    updateIncomeAdvanceSelect();
  </script>
</body>
</html>
