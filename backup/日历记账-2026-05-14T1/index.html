<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
  <title>日历记账本</title>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js">
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; padding: 10px; max-width: 500px; margin: auto; }
    body.modal-open { overflow: hidden; position: fixed; width: 100%; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .header button { font-size: 1.2rem; padding: 5px 12px; background: #fff; border: 1px solid #ccc; border-radius: 8px; cursor: pointer; }
    .header h2 { margin: 0; font-size: 1.1rem; }
    .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; background: white; padding: 8px; border-radius: 12px; }
    .day-label { text-align: center; font-weight: bold; padding: 5px 0; color: #666; font-size: 0.85rem; }
    .day-cell { aspect-ratio: 1/1; border-radius: 10px; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; font-size: 0.9rem; border: 1px solid #eee; -webkit-tap-highlight-color: transparent; }
    .day-cell.today { border: 2px solid #007aff; }
    .day-cell.has-record { background: #fff3cd; font-weight: bold; }
    .day-cell .amount { font-size: 0.65rem; color: #d9534f; margin-top: 2px; }
    .day-cell .amount.negative { color: #28a745; }
    .day-cell.empty { background: transparent; border: none; cursor: default; }

    /* 工具栏 */
    .toolbar { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .toolbar button { padding: 6px 10px; border: 1px solid #ccc; border-radius: 8px; background: #fff; font-size: 0.75rem; cursor: pointer; -webkit-tap-highlight-color: transparent; display: flex; align-items: center; gap: 4px; }
    .toolbar button:active { background: #f0f0f0; }

    .summary { margin-top: 15px; background: white; border-radius: 12px; padding: 12px; margin-bottom: 20px; }
    .summary-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .summary-header h3 { font-size: 1rem; margin: 0; }
    .summary-category { margin-bottom: 12px; padding: 10px; background: #f8f9fa; border-radius: 8px; border-left: 4px solid #007aff; }
    .summary-category-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .summary-category-name-row { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
    .summary-category-name { font-weight: bold; font-size: 0.95rem; color: #333; }
    .summary-category-amount { font-weight: bold; font-size: 1rem; color: #d9534f; }
    .summary-category-amount.negative { color: #28a745; }
    .summary-category-days { font-size: 0.8rem; color: #666; margin-top: 5px; }
    .summary-category-days span { display: inline-block; background: #e9ecef; padding: 2px 8px; border-radius: 4px; margin: 2px 4px 2px 0; font-size: 0.75rem; }
    .summary-total { margin-top: 12px; padding-top: 10px; border-top: 2px solid #eee; display: flex; justify-content: space-between; font-weight: bold; font-size: 1rem; }

    .btn-sm { border: none; padding: 3px 8px; border-radius: 6px; font-size: 0.7rem; cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
    .btn-export { background: #28a745; color: white; }
    .btn-export:active { background: #1e7e34; }
    .btn-edit { background: #ffc107; color: #333; }
    .btn-edit:active { background: #e0a800; }
    .btn-edit-confirm { background: #007aff; color: white; margin-left: 4px; }
    .btn-edit-cancel { background: #6c757d; color: white; margin-left: 4px; }
    .btn-danger { background: #dc3545; color: white; }

    .edit-category-row { display: flex; align-items: center; gap: 4px; }
    .edit-category-row input { padding: 4px 8px; border: 1px solid #007aff; border-radius: 6px; font-size: 0.85rem; width: 100px; }

    .export-area { padding: 20px; background: white; }
    .export-title { text-align: center; font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; color: #333; }
    .export-subtitle { text-align: center; font-size: 0.9rem; color: #666; margin-bottom: 15px; }
    .export-category { margin-bottom: 15px; padding: 10px; background: #f8f9fa; border-radius: 8px; border-left: 4px solid #007aff; }
    .export-detail-item { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.85rem; border-bottom: 1px dashed #eee; }
    .export-detail-item .detail-date { color: #666; font-weight: 500; }
    .export-detail-item .detail-note { color: #888; font-size: 0.8rem; }
    .export-detail-item .detail-amount { font-weight: bold; }
    .export-detail-item .detail-amount.positive { color: #d9534f; }
    .export-detail-item .detail-amount.negative { color: #28a745; }
    .export-category-total { display: flex; justify-content: space-between; padding-top: 6px; margin-top: 4px; border-top: 1px solid #ddd; font-weight: bold; font-size: 0.9rem; }

    /* 弹窗 */
    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 99; overflow: hidden; }
    .modal.active { display: flex; justify-content: center; align-items: flex-end; }
    .modal-content {
      background: white;
      border-radius: 16px 16px 0 0;
      padding: 20px;
      width: 100%;
      max-width: 500px;
      max-height: 85vh;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      position: relative;
    }
    .modal-handle { width: 40px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 12px; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .modal-header h3 { font-size: 1rem; margin: 0; }
    .close { font-size: 1.5rem; cursor: pointer; line-height: 1; padding: 5px; -webkit-tap-highlight-color: transparent; }

    .records-section { max-height: 200px; overflow-y: auto; -webkit-overflow-scrolling: touch; margin-bottom: 10px; }
    .record-item { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; margin: 5px 0; padding: 8px 10px; border-radius: 8px; font-size: 0.9rem; }
    .record-item .info { flex: 1; min-width: 0; }
    .record-item .info strong { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .record-item .info small { color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
    .record-item .amount-text { font-weight: bold; margin-left: 10px; white-space: nowrap; flex-shrink: 0; }
    .record-item .amount-text.positive { color: #d9534f; }
    .record-item .amount-text.negative { color: #28a745; }
    .delete-btn { background: #dc3545; color: white; border: none; border-radius: 50%; width: 24px; height: 24px; font-size: 14px; cursor: pointer; flex-shrink: 0; margin-left: 8px; -webkit-tap-highlight-color: transparent; }

    .add-form { border-top: 1px solid #eee; padding-top: 12px; }
    .form-group { margin-bottom: 10px; }
    .form-group label { display: block; font-size: 0.85rem; color: #333; margin-bottom: 4px; font-weight: 500; }
    .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; -webkit-appearance: none; }
    .form-group input:focus { outline: none; border-color: #007aff; }
    .form-hint { font-size: 0.7rem; color: #888; margin-top: 2px; display: block; }
    .btn-row { display: flex; gap: 8px; margin-top: 5px; }
    .btn-add { flex: 1; padding: 12px; background: #007aff; color: white; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .btn-add:active { background: #0056b3; }
    .btn-clear { padding: 12px 16px; background: #6c757d; color: white; border: none; border-radius: 10px; font-size: 0.9rem; cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
    .btn-clear:active { background: #545b62; }

    .last-record-hint { font-size: 0.7rem; color: #28a745; margin-top: 2px; display: block; }

    /* 确认弹窗 */
    .confirm-dialog { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 199; justify-content: center; align-items: center; }
    .confirm-dialog.active { display: flex; }
    .confirm-box { background: white; border-radius: 14px; padding: 20px; width: 85%; max-width: 350px; text-align: center; }
    .confirm-box p { margin-bottom: 15px; font-size: 0.95rem; }
    .confirm-box .btn-row { justify-content: center; }
    .confirm-box button { padding: 10px 20px; border: none; border-radius: 8px; font-size: 0.9rem; cursor: pointer; }
    .confirm-btn-cancel { background: #f0f0f0; color: #333; margin-right: 10px; }
    .confirm-btn-ok { background: #dc3545; color: white; }

    .loading-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 999; }
    .loading-overlay.active { display: flex; }
    .loading-box { background: white; padding: 20px 30px; border-radius: 12px; text-align: center; }
    .loading-spinner { width: 40px; height: 40px; border: 4px solid #eee; border-top: 4px solid #007aff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; font-size: 0.85rem; z-index: 299; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }

    @media (min-width: 768px) {
      .modal.active { align-items: center; }
      .modal-content { border-radius: 16px; max-height: 80vh; margin: 20px; }
      .modal-handle { display: none; }
    }
  </style>
</head>
<body>
  <div id="toast" class="toast"></div>

  <div class="header">
    <button id="prevMonth">&lt;</button>
    <h2 id="monthTitle"></h2>
    <button id="nextMonth">&gt;</button>
  </div>

  <!-- 工具栏 -->
  <div class="toolbar">
    <button id="exportDataBtn">💾 导出备份</button>
    <button id="importDataBtn">📥 导入备份</button>
    <button id="clearAllBtn" class="btn-danger">🗑️ 清空数据</button>
  </div>
  <input type="file" id="importFileInput" accept=".json" style="display:none;">

  <div class="calendar" id="calendar"></div>

  <div class="summary">
    <div class="summary-header">
      <h3>📊 本月分类汇总</h3>
    </div>
    <div id="summaryContent"></div>
  </div>

  <div id="exportTemplate" style="position: absolute; left: -9999px; top: 0; width: 500px;"></div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-box">
      <div class="loading-spinner"></div>
      <p>正在生成图片...</p>
    </div>
  </div>

  <!-- 确认弹窗 -->
  <div class="confirm-dialog" id="confirmDialog">
    <div class="confirm-box">
      <p id="confirmMessage">确定要清空所有数据吗？此操作不可恢复！</p>
      <div class="btn-row">
        <button class="confirm-btn-cancel" id="confirmCancel">取消</button>
        <button class="confirm-btn-ok" id="confirmOk">确定</button>
      </div>
    </div>
  </div>

  <!-- 记账弹窗 -->
  <div class="modal" id="modal">
    <div class="modal-content" id="modalContent">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h3 id="modalDate"></h3>
        <span class="close" id="closeModal">&times;</span>
      </div>
      <div class="records-section" id="modalRecords"></div>

      <div class="add-form">
        <div class="form-group">
          <label>分类名称：</label>
          <input type="text" id="category" placeholder="例如：吃饭、住旅馆、买衣服" autocomplete="off">
          <span class="last-record-hint" id="categoryHint"></span>
        </div>
        <div class="form-group">
          <label>金额：</label>
          <input type="number" id="amount" placeholder="退款请输入负数，如 -200" step="0.01" inputmode="decimal">
          <span class="form-hint">💡 消费输入正数，退款/抵扣输入负数</span>
        </div>
        <div class="form-group">
          <label>备注（可选）：</label>
          <input type="text" id="note" placeholder="例如：好友饭店" autocomplete="off">
          <span class="last-record-hint" id="noteHint"></span>
        </div>
        <div class="btn-row">
          <button class="btn-add" id="addRecord">添加记录</button>
          <button class="btn-clear" id="clearForm">清空</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'ledger_records';
    const LAST_INPUT_KEY = 'ledger_last_input';

    let currentYear, currentMonth;
    let records = [];
    let selectedDate = null;
    let lastInput = { category: '', note: '' };

    // ============ Toast ============
    function showToast(msg, duration = 2000) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), duration);
    }

    // ============ 数据管理 ============
    function loadRecords() {
      const raw = localStorage.getItem(STORAGE_KEY);
      records = raw ? JSON.parse(raw) : [];
    }

    function saveRecords() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    // 导出数据为 JSON 文件
    function exportData() {
      const data = {
        version: 1,
        exportTime: new Date().toISOString(),
        totalRecords: records.length,
        records: records
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `记账数据备份_${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      showToast(`✅ 已导出 ${records.length} 条记录`);
    }

    // 导入数据
    function importData(file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          if (!data.records || !Array.isArray(data.records)) {
            throw new Error('数据格式不正确');
          }

          // 验证每条记录
          const validRecords = data.records.filter(r => {
            return r.id && r.date && r.category && typeof r.amount === 'number';
          });

          if (validRecords.length === 0) {
            throw new Error('没有有效的记录');
          }

          // 合并还是替换？这里用替换（也可以改为合并）
          const mode = confirm('点击"确定"将替换现有数据\n点击"取消"将合并数据（追加）');
          
          if (mode) {
            records = validRecords;
          } else {
            // 合并：根据 id 去重
            const existingIds = new Set(records.map(r => r.id));
            const newRecords = validRecords.filter(r => !existingIds.has(r.id));
            records = [...records, ...newRecords];
          }

          saveRecords();
          renderCalendar();
          showToast(`✅ 成功导入 ${mode ? validRecords.length : records.length} 条记录`);
        } catch (error) {
          alert('导入失败：' + error.message);
        }
      };
      reader.readAsText(file);
    }

    // 清空所有数据
    function clearAllData() {
      records = [];
      saveRecords();
      renderCalendar();
      showToast('🗑️ 数据已清空');
    }

    // ============ 上次输入记忆 ============
    function loadLastInput() {
      const raw = localStorage.getItem(LAST_INPUT_KEY);
      lastInput = raw ? JSON.parse(raw) : { category: '', note: '' };
    }

    function saveLastInput(category, note) {
      lastInput = { category, note };
      localStorage.setItem(LAST_INPUT_KEY, JSON.stringify(lastInput));
    }

    function fillLastInput() {
      const categoryInput = document.getElementById('category');
      const noteInput = document.getElementById('note');
      const categoryHint = document.getElementById('categoryHint');
      const noteHint = document.getElementById('noteHint');

      if (lastInput.category) {
        categoryInput.value = lastInput.category;
        categoryHint.textContent = '已填入上次记录';
      } else {
        categoryInput.value = '';
        categoryHint.textContent = '';
      }
      if (lastInput.note) {
        noteInput.value = lastInput.note;
        noteHint.textContent = '已填入上次记录';
      } else {
        noteInput.value = '';
        noteHint.textContent = '';
      }
      document.getElementById('amount').value = '';
    }

    function clearForm() {
      document.getElementById('category').value = '';
      document.getElementById('amount').value = '';
      document.getElementById('note').value = '';
      document.getElementById('categoryHint').textContent = '';
      document.getElementById('noteHint').textContent = '';
      document.getElementById('amount').focus();
    }

    // ============ 数据查询 ============
    function getRecordsByDate(dateStr) {
      return records.filter(r => r.date === dateStr);
    }

    function getRecordsByMonth(year, month) {
      const prefix = `${year}-${String(month).padStart(2,'0')}`;
      return records.filter(r => r.date.startsWith(prefix));
    }

    function getDayTotal(dateStr) {
      return getRecordsByDate(dateStr).reduce((sum, r) => sum + r.amount, 0);
    }

    function getDetailedSummary(year, month) {
      const monthRecords = getRecordsByMonth(year, month);
      const summary = {};
      monthRecords.forEach(r => {
        if (!summary[r.category]) {
          summary[r.category] = { total: 0, records: [] };
        }
        summary[r.category].total += r.amount;
        const day = parseInt(r.date.split('-')[2]);
        summary[r.category].records.push({ day: day, amount: r.amount, note: r.note, date: r.date });
      });
      for (const cat in summary) {
        summary[cat].records.sort((a, b) => a.day - b.day);
      }
      return summary;
    }

    // ============ 重命名分类 ============
    function renameCategory(oldName, newName) {
      newName = newName.trim();
      if (!newName) { alert('分类名称不能为空'); return false; }
      if (oldName === newName) return true;
      const monthRecords = getRecordsByMonth(currentYear, currentMonth);
      const existingCategories = new Set(monthRecords.map(r => r.category));
      if (existingCategories.has(newName) && newName !== oldName) {
        alert(`分类"${newName}"已存在，请使用其他名称`);
        return false;
      }
      records.forEach(r => {
        if (r.category === oldName) r.category = newName;
      });
      saveRecords();
      renderCalendar();
      return true;
    }

    function getAmountClass(amount) { return amount < 0 ? 'negative' : 'positive'; }

    // ============ 渲染 ============
    function renderCalendar() {
      const title = document.getElementById('monthTitle');
      title.textContent = `${currentYear}年 ${currentMonth}月`;

      const firstDay = new Date(currentYear, currentMonth - 1, 1);
      const startDayOfWeek = firstDay.getDay();
      const prevMonthDays = startDayOfWeek;
      const totalCells = 42;
      const calendarDiv = document.getElementById('calendar');
      calendarDiv.innerHTML = '';

      const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
      weekDays.forEach(d => {
        const label = document.createElement('div');
        label.className = 'day-label';
        label.textContent = d;
        calendarDiv.appendChild(label);
      });

      const today = new Date();
      const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

      for (let i = 0; i < totalCells; i++) {
        const cell = document.createElement('div');
        const dayOffset = i - prevMonthDays + 1;
        const cellDate = new Date(currentYear, currentMonth - 1, dayOffset);
        const cellMonth = cellDate.getMonth() + 1;
        const cellYear = cellDate.getFullYear();
        const cellDateStr = `${cellYear}-${String(cellMonth).padStart(2,'0')}-${String(cellDate.getDate()).padStart(2,'0')}`;

        if (cellMonth !== currentMonth) {
          cell.className = 'day-cell empty';
          cell.textContent = '';
        } else {
          cell.className = 'day-cell';
          cell.textContent = cellDate.getDate();
          if (cellDateStr === todayStr) cell.classList.add('today');

          const total = getDayTotal(cellDateStr);
          if (total !== 0) {
            cell.classList.add('has-record');
            const amtSpan = document.createElement('span');
            amtSpan.className = 'amount';
            if (total < 0) amtSpan.classList.add('negative');
            amtSpan.textContent = total < 0 ? `-¥${Math.abs(total).toFixed(1)}` : `¥${total.toFixed(1)}`;
            cell.appendChild(amtSpan);
          }
          cell.addEventListener('click', () => openModal(cellDateStr));
        }
        calendarDiv.appendChild(cell);
      }
      renderSummary();
    }

    function renderSummary() {
      const summaryDiv = document.getElementById('summaryContent');
      const summary = getDetailedSummary(currentYear, currentMonth);
      const categories = Object.keys(summary);

      if (categories.length === 0) {
        summaryDiv.innerHTML = '<p style="color:#888;">这个月还没有记录</p>';
        return;
      }

      categories.sort((a, b) => summary[b].total - summary[a].total);

      let html = '';
      let grandTotal = 0;

      categories.forEach((cat, index) => {
        const data = summary[cat];
        grandTotal += data.total;

        const daysList = [...new Set(data.records.map(r => r.day))].sort((a, b) => a - b);
        const daysHtml = daysList.map(d => `<span>${d}号</span>`).join('');
        const amountClass = data.total < 0 ? 'negative' : '';
        const totalDisplay = data.total < 0 ? `-¥${Math.abs(data.total).toFixed(2)}` : `¥${data.total.toFixed(2)}`;

        html += `
          <div class="summary-category">
            <div class="summary-category-header">
              <div class="summary-category-name-row">
                <span class="summary-category-name" id="catName_${index}">${cat}</span>
                <span class="edit-category-row" id="editRow_${index}" style="display:none;">
                  <input type="text" id="editInput_${index}" value="${cat}">
                  <button class="btn-sm btn-edit-confirm" onclick="confirmRename('${cat}', ${index})">✓</button>
                  <button class="btn-sm btn-edit-cancel" onclick="cancelEdit(${index})">✕</button>
                </span>
              </div>
              <span class="summary-category-amount ${amountClass}">${totalDisplay}</span>
            </div>
            <div class="summary-category-days">${daysHtml}</div>
            <div style="margin-top:6px;">
              <button class="btn-sm btn-edit" onclick="startEdit(${index})">✏️ 改名</button>
              <button class="btn-sm btn-export" onclick="event.stopPropagation(); exportCategoryToImage('${cat}')">📷 导出</button>
            </div>
          </div>
        `;
      });

      const grandDisplay = grandTotal < 0 ? `-¥${Math.abs(grandTotal).toFixed(2)}` : `¥${grandTotal.toFixed(2)}`;
      html += `<div class="summary-total"><span>合计</span><span>${grandDisplay}</span></div>`;
      summaryDiv.innerHTML = html;
    }

    window.startEdit = function(index) {
      document.getElementById(`catName_${index}`).style.display = 'none';
      document.getElementById(`editRow_${index}`).style.display = 'flex';
      document.getElementById(`editInput_${index}`).focus();
      document.getElementById(`editInput_${index}`).select();
    };

    window.cancelEdit = function(index) {
      document.getElementById(`catName_${index}`).style.display = 'inline';
      document.getElementById(`editRow_${index}`).style.display = 'none';
    };

    window.confirmRename = function(oldName, index) {
      const newName = document.getElementById(`editInput_${index}`).value;
      renameCategory(oldName, newName);
    };

    window.exportCategoryToImage = async function(categoryName) {
      const summary = getDetailedSummary(currentYear, currentMonth);
      const data = summary[categoryName];
      if (!data || data.records.length === 0) { alert('该分类没有记录'); return; }

      document.getElementById('loadingOverlay').classList.add('active');
      const monthStr = `${currentYear}年${currentMonth}月`;

      let html = `
        <div class="export-area">
          <div class="export-title">📌 ${categoryName}</div>
          <div class="export-subtitle">${monthStr} 消费明细</div>
          <div class="export-category">
      `;

      data.records.forEach(r => {
        const amountClass = r.amount < 0 ? 'negative' : 'positive';
        const amountDisplay = r.amount < 0 ? `-¥${Math.abs(r.amount).toFixed(2)}` : `¥${r.amount.toFixed(2)}`;
        html += `
          <div class="export-detail-item">
            <span><span class="detail-date">${r.day}号</span>${r.note ? `<span class="detail-note"> - ${r.note}</span>` : ''}</span>
            <span class="detail-amount ${amountClass}">${amountDisplay}</span>
          </div>
        `;
      });

      const totalClass = data.total < 0 ? 'negative' : 'positive';
      const totalDisplay = data.total < 0 ? `-¥${Math.abs(data.total).toFixed(2)}` : `¥${data.total.toFixed(2)}`;
      html += `
            <div class="export-category-total"><span>小计</span><span class="detail-amount ${totalClass}">${totalDisplay}</span></div>
          </div>
          <div style="text-align:center; margin-top:15px; color:#999; font-size:0.75rem;">导出时间：${new Date().toLocaleString()}</div>
        </div>
      `;

      const template = document.getElementById('exportTemplate');
      template.innerHTML = html;

      try {
        const canvas = await html2canvas(template.querySelector('.export-area'), { backgroundColor: '#ffffff', scale: 2, useCORS: true, logging: false });
        const link = document.createElement('a');
        link.download = `${categoryName}_${monthStr}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      } catch (error) {
        alert('导出失败，请重试');
      }
      document.getElementById('loadingOverlay').classList.remove('active');
      template.innerHTML = '';
    };

    // ============ 弹窗 ============
    function openModal(dateStr) {
      selectedDate = dateStr;
      document.getElementById('modalDate').textContent = `📅 ${dateStr}`;
      renderModalRecords();
      fillLastInput();
      document.body.classList.add('modal-open');
      document.getElementById('modal').classList.add('active');
      document.getElementById('modalContent').scrollTop = 0;
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
      document.body.classList.remove('modal-open');
      selectedDate = null;
    }

    function renderModalRecords() {
      const container = document.getElementById('modalRecords');
      const dayRecords = getRecordsByDate(selectedDate);
      if (dayRecords.length === 0) {
        container.innerHTML = '<p style="color:#888; text-align:center; padding:10px;">当天暂无记录</p>';
        return;
      }
      let html = '';
      dayRecords.forEach(r => {
        const amountClass = r.amount < 0 ? 'negative' : 'positive';
        const amountDisplay = r.amount < 0 ? `-¥${Math.abs(r.amount).toFixed(2)}` : `¥${r.amount.toFixed(2)}`;
        html += `
          <div class="record-item">
            <div class="info"><strong>${r.category}</strong>${r.note ? `<small>${r.note}</small>` : ''}</div>
            <span class="amount-text ${amountClass}">${amountDisplay}</span>
            <button class="delete-btn" data-id="${r.id}">×</button>
          </div>`;
      });
      container.innerHTML = html;
      container.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = e.target.getAttribute('data-id');
          records = records.filter(r => r.id != id);
          saveRecords();
          renderModalRecords();
          renderCalendar();
        });
      });
    }

    // ============ 事件绑定 ============
    document.getElementById('addRecord').addEventListener('click', () => {
      if (!selectedDate) return;
      const categoryInput = document.getElementById('category');
      const amountInput = document.getElementById('amount');
      const noteInput = document.getElementById('note');

      const category = categoryInput.value.trim();
      const amount = parseFloat(amountInput.value);
      const note = noteInput.value.trim();

      if (!category) { alert('请输入分类名称'); categoryInput.focus(); return; }
      if (isNaN(amount) || amount === 0) { alert('请输入有效金额（正数或负数）'); amountInput.focus(); return; }

      saveLastInput(category, note);
      records.push({ id: Date.now(), date: selectedDate, category, amount, note });
      saveRecords();

      amountInput.value = '';
      amountInput.focus();
      renderModalRecords();
      renderCalendar();
    });

    document.getElementById('clearForm').addEventListener('click', clearForm);
    document.getElementById('closeModal').addEventListener('click', closeModal);
    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modal')) closeModal();
    });
    document.getElementById('modalContent').addEventListener('touchmove', (e) => {
      e.stopPropagation();
    }, { passive: false });

    // 数据管理按钮
    document.getElementById('exportDataBtn').addEventListener('click', exportData);
    document.getElementById('importDataBtn').addEventListener('click', () => {
      document.getElementById('importFileInput').click();
    });
    document.getElementById('importFileInput').addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        importData(e.target.files[0]);
        e.target.value = '';
      }
    });

    // 清空数据（确认弹窗）
    let confirmCallback = null;
    document.getElementById('clearAllBtn').addEventListener('click', () => {
      document.getElementById('confirmMessage').textContent = '确定要清空所有数据吗？此操作不可恢复！建议先导出备份。';
      confirmCallback = clearAllData;
      document.getElementById('confirmDialog').classList.add('active');
    });
    document.getElementById('confirmCancel').addEventListener('click', () => {
      document.getElementById('confirmDialog').classList.remove('active');
      confirmCallback = null;
    });
    document.getElementById('confirmOk').addEventListener('click', () => {
      document.getElementById('confirmDialog').classList.remove('active');
      if (confirmCallback) confirmCallback();
      confirmCallback = null;
    });

    // 月份切换
    document.getElementById('prevMonth').addEventListener('click', () => {
      if (currentMonth === 1) { currentMonth = 12; currentYear--; }
      else { currentMonth--; }
      renderCalendar();
    });
    document.getElementById('nextMonth').addEventListener('click', () => {
      if (currentMonth === 12) { currentMonth = 1; currentYear++; }
      else { currentMonth++; }
      renderCalendar();
    });

    // 输入框聚焦滚动
    const inputs = document.querySelectorAll('#modalContent input');
    inputs.forEach(input => {
      input.addEventListener('focus', () => {
        setTimeout(() => { input.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 300);
      });
    });

    // 启动
    const now = new Date();
    currentYear = now.getFullYear();
    currentMonth = now.getMonth() + 1;
    loadRecords();
    loadLastInput();
    renderCalendar();
  </script>
</body>
</html>
