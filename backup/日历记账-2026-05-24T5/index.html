<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
  <title>日历记账本</title>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; padding: 10px; max-width: 500px; margin: auto; }
    body.modal-open { overflow: hidden; position: fixed; width: 100%; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .header button { font-size: 1.2rem; padding: 5px 12px; background: #fff; border: 1px solid #ccc; border-radius: 8px; cursor: pointer; }
    .header h2 { margin: 0; font-size: 1.1rem; }
    .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; background: white; padding: 8px; border-radius: 12px; }
    .day-label { text-align: center; font-weight: bold; padding: 5px 0; color: #666; font-size: 0.85rem; }
    .day-cell { aspect-ratio: 1/1; border-radius: 10px; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; font-size: 0.9rem; border: 1px solid #eee; -webkit-tap-highlight-color: transparent; }
    .day-cell.today { border: 2px solid #007aff; }
    .day-cell.has-record { background: #fff3cd; font-weight: bold; }
    .day-cell .amount { font-size: 0.65rem; color: #d9534f; margin-top: 2px; }
    .day-cell .amount.negative { color: #28a745; }
    .day-cell .attendance-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin: 1px 2px 0 0; vertical-align: middle; }
    .day-cell.empty { background: transparent; border: none; cursor: default; }
    .day-cell .cell-content { display: flex; flex-direction: column; align-items: center; }

    .toolbar { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
    .toolbar button { padding: 6px 10px; border: 1px solid #ccc; border-radius: 8px; background: #fff; font-size: 0.75rem; cursor: pointer; -webkit-tap-highlight-color: transparent; display: flex; align-items: center; gap: 4px; }
    .toolbar button:active { background: #f0f0f0; }

    .summary { margin-top: 15px; background: white; border-radius: 12px; padding: 12px; margin-bottom: 20px; }
    .summary-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .summary-header h3 { font-size: 1rem; margin: 0; }
    .summary-category { margin-bottom: 12px; padding: 10px; background: #f8f9fa; border-radius: 8px; border-left: 4px solid #007aff; }
    .summary-category-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .summary-category-name-row { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
    .summary-category-name { font-weight: bold; font-size: 0.95rem; color: #333; }
    .summary-category-amount { font-weight: bold; font-size: 1rem; color: #d9534f; }
    .summary-category-amount.negative { color: #28a745; }
    .summary-category-days { font-size: 0.8rem; color: #666; margin-top: 5px; }
    .summary-category-days span { display: inline-block; background: #e9ecef; padding: 2px 8px; border-radius: 4px; margin: 2px 4px 2px 0; font-size: 0.75rem; }
    .summary-total { margin-top: 12px; padding-top: 10px; border-top: 2px solid #eee; display: flex; justify-content: space-between; font-weight: bold; font-size: 1rem; }

    .btn-sm { border: none; padding: 3px 8px; border-radius: 6px; font-size: 0.7rem; cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
    .btn-export { background: #28a745; color: white; }
    .btn-export:active { background: #1e7e34; }
    .btn-edit { background: #ffc107; color: #333; }
    .btn-edit:active { background: #e0a800; }
    .btn-edit-confirm { background: #007aff; color: white; margin-left: 4px; }
    .btn-edit-cancel { background: #6c757d; color: white; margin-left: 4px; }
    /* 修正清空数据按钮样式 */
    .btn-danger { background: #dc3545 !important; color: white !important; font-weight: bold !important; border: 1px solid #dc3545 !important; }

    .edit-category-row { display: flex; align-items: center; gap: 4px; }
    .edit-category-row input { padding: 4px 8px; border: 1px solid #007aff; border-radius: 6px; font-size: 0.85rem; width: 100px; }

    .export-area { padding: 20px; background: white; }
    .export-title { text-align: center; font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; color: #333; }
    .export-subtitle { text-align: center; font-size: 0.9rem; color: #666; margin-bottom: 15px; }
    .export-category { margin-bottom: 15px; padding: 10px; background: #f8f9fa; border-radius: 8px; border-left: 4px solid #007aff; }
    .export-detail-item { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.85rem; border-bottom: 1px dashed #eee; }
    .export-detail-item .detail-date { color: #666; font-weight: 500; }
    .export-detail-item .detail-note { color: #888; font-size: 0.8rem; }
    .export-detail-item .detail-amount { font-weight: bold; }
    .export-detail-item .detail-amount.positive { color: #d9534f; }
    .export-detail-item .detail-amount.negative { color: #28a745; }
    .export-category-total { display: flex; justify-content: space-between; padding-top: 6px; margin-top: 4px; border-top: 1px solid #ddd; font-weight: bold; font-size: 0.9rem; }

    .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 99; overflow: hidden; }
    .modal.active { display: flex; justify-content: center; align-items: flex-end; }
    .modal-content {
      background: white;
      border-radius: 16px 16px 0 0;
      padding: 20px;
      width: 100%;
      max-width: 500px;
      max-height: 85vh;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      position: relative;
    }
    .modal-handle { width: 40px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 12px; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .modal-header h3 { font-size: 1rem; margin: 0; }
    .close { font-size: 1.5rem; cursor: pointer; line-height: 1; padding: 5px; -webkit-tap-highlight-color: transparent; }

    .records-section { max-height: 200px; overflow-y: auto; -webkit-overflow-scrolling: touch; margin-bottom: 10px; }
    .record-item { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; margin: 5px 0; padding: 8px 10px; border-radius: 8px; font-size: 0.9rem; }
    .record-item .info { flex: 1; min-width: 0; }
    .record-item .info strong { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .record-item .info small { color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
    .record-item .amount-text { font-weight: bold; margin-left: 10px; white-space: nowrap; flex-shrink: 0; }
    .record-item .amount-text.positive { color: #d9534f; }
    .record-item .amount-text.negative { color: #28a745; }
    .delete-btn { background: #dc3545; color: white; border: none; border-radius: 50%; width: 24px; height: 24px; font-size: 14px; cursor: pointer; flex-shrink: 0; margin-left: 8px; -webkit-tap-highlight-color: transparent; }

    .add-form { border-top: 1px solid #eee; padding-top: 12px; }
    .form-group { margin-bottom: 10px; }
    .form-group label { display: block; font-size: 0.85rem; color: #333; margin-bottom: 4px; font-weight: 500; }
    .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; -webkit-appearance: none; }
    .form-group input:focus { outline: none; border-color: #007aff; }
    .form-hint { font-size: 0.7rem; color: #888; margin-top: 2px; display: block; }
    .btn-row { display: flex; gap: 8px; margin-top: 5px; }
    .btn-add { flex: 1; padding: 12px; background: #007aff; color: white; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .btn-add:active { background: #0056b3; }
    .btn-clear, .btn-attendance { padding: 12px 16px; background: #6c757d; color: white; border: none; border-radius: 10px; font-size: 0.9rem; cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
    .btn-clear:active, .btn-attendance:active { background: #545b62; }
    .btn-attendance { background: #17a2b8; }
    .btn-attendance:active { background: #138496; }

    .last-record-hint { font-size: 0.7rem; color: #28a745; margin-top: 2px; display: block; }

    .attendance-options { display: flex; flex-direction: column; gap: 8px; margin: 10px 0; }
    .attendance-option { padding: 12px; border: 2px solid #eee; border-radius: 10px; text-align: center; cursor: pointer; font-size: 0.9rem; }
    .attendance-option.selected { border-color: #007aff; background: #e8f0fe; }
    .attendance-option input { width: 80px; padding: 5px; border: 1px solid #ddd; border-radius: 5px; text-align: center; display: none; }
    .attendance-option.selected input { display: inline-block; }

    .confirm-dialog { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 199; justify-content: center; align-items: center; }
    .confirm-dialog.active { display: flex; }
    .confirm-box { background: white; border-radius: 14px; padding: 20px; width: 85%; max-width: 350px; text-align: center; }
    .confirm-box p { margin-bottom: 15px; font-size: 0.95rem; }
    .confirm-box .btn-row { justify-content: center; }
    .confirm-box button { padding: 10px 20px; border: none; border-radius: 8px; font-size: 0.9rem; cursor: pointer; }
    .confirm-btn-cancel { background: #f0f0f0; color: #333; margin-right: 10px; }
    .confirm-btn-ok { background: #dc3545; color: white; }

    .loading-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 999; }
    .loading-overlay.active { display: flex; }
    .loading-box { background: white; padding: 20px 30px; border-radius: 12px; text-align: center; }
    .loading-spinner { width: 40px; height: 40px; border: 4px solid #eee; border-top: 4px solid #007aff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; font-size: 0.85rem; z-index: 299; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }

    .attendance-stats { margin-top: 15px; background: #e8f5e9; border-radius: 10px; padding: 10px; font-size: 0.85rem; }
    .attendance-stats h4 { font-size: 0.9rem; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
    .attendance-stats .stat-row { display: flex; justify-content: space-between; margin: 2px 0; }

    .month-list { max-height: 200px; overflow-y: auto; margin: 10px 0; }
    .month-item { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; }
    .month-item input[type="checkbox"] { margin-right: 10px; width: 18px; height: 18px; }
    .month-item label { flex: 1; font-size: 0.9rem; }

    @media (min-width: 768px) {
      .modal.active { align-items: center; }
      .modal-content { border-radius: 16px; max-height: 80vh; margin: 20px; }
      .modal-handle { display: none; }
    }
  </style>
</head>
<body>
  <div id="toast" class="toast"></div>

  <div class="header">
    <button id="prevMonth">&lt;</button>
    <h2 id="monthTitle"></h2>
    <button id="nextMonth">&gt;</button>
  </div>

  <div class="toolbar">
    <button id="exportDataBtn">💾 导出备份</button>
    <button id="importDataBtn">📥 导入备份</button>
    <button id="clearAllBtn" class="btn-danger">🗑️ 清空数据</button>
  </div>
  <input type="file" id="importFileInput" accept=".json" style="display:none;">

  <div class="calendar" id="calendar"></div>

  <div class="summary">
    <div class="summary-header">
      <h3>📊 本月分类汇总</h3>
    </div>
    <div id="summaryContent"></div>
  </div>

  <div id="exportTemplate" style="position: absolute; left: -9999px; top: 0; width: 500px;"></div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-box">
      <div class="loading-spinner"></div>
      <p>正在生成图片...</p>
    </div>
  </div>

  <div class="confirm-dialog" id="confirmDialog">
    <div class="confirm-box">
      <p id="confirmMessage"></p>
      <div class="btn-row">
        <button class="confirm-btn-cancel" id="confirmCancel">取消</button>
        <button class="confirm-btn-ok" id="confirmOk">确定</button>
      </div>
    </div>
  </div>

  <!-- 月份选择弹窗 -->
  <div class="modal" id="monthSelectModal">
    <div class="modal-content">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h3>选择要导出的月份</h3>
        <span class="close" id="closeMonthSelect">&times;</span>
      </div>
      <div class="month-list" id="monthList"></div>
      <div class="btn-row" style="margin-top:10px;">
        <button id="selectAllMonths" class="btn-sm" style="background:#6c757d;color:white;">全选</button>
        <button id="deselectAllMonths" class="btn-sm" style="background:#6c757d;color:white;">取消全选</button>
      </div>
      <button id="confirmExportBtn" style="width:100%; padding:12px; background:#007aff; color:white; border:none; border-radius:10px; font-size:1rem; margin-top:10px;">导出所选月份</button>
    </div>
  </div>

  <!-- 记账弹窗 -->
  <div class="modal" id="modal">
    <div class="modal-content" id="modalContent">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h3 id="modalDate"></h3>
        <span class="close" id="closeModal">&times;</span>
      </div>
      <div class="records-section" id="modalRecords"></div>
      <div class="add-form">
        <div class="form-group">
          <label>分类名称：</label>
          <input type="text" id="category" placeholder="例如：吃饭、住旅馆、买衣服" autocomplete="off">
          <span class="last-record-hint" id="categoryHint"></span>
        </div>
        <div class="form-group">
          <label>金额：</label>
          <input type="number" id="amount" placeholder="退款请输入负数，如 -200" step="0.01" inputmode="decimal">
          <span class="form-hint">💡 消费输入正数，退款/抵扣输入负数</span>
        </div>
        <div class="form-group">
          <label>备注（可选）：</label>
          <input type="text" id="note" placeholder="例如：好友饭店" autocomplete="off">
          <span class="last-record-hint" id="noteHint"></span>
        </div>
        <div class="btn-row">
          <button class="btn-add" id="addRecord">添加记录</button>
          <button class="btn-clear" id="clearForm">清空</button>
          <button class="btn-attendance" id="openAttendanceBtn">📅 出勤</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 出勤选择弹窗 -->
  <div class="modal" id="attendanceModal">
    <div class="modal-content" style="max-height: 60vh;">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h3 id="attendanceDateTitle">出勤设置</h3>
        <span class="close" id="closeAttendanceModal">&times;</span>
      </div>
      <div class="attendance-options" id="attendanceOptions">
        <div class="attendance-option" data-type="full">🔵 全天（1天）</div>
        <div class="attendance-option" data-type="half">🟠 半天（0.5天）</div>
        <div class="attendance-option" data-type="overtime">🔴 加班 <input type="number" id="overtimeHours" placeholder="天数" step="0.5" min="0.5"> 天</div>
        <div class="attendance-option" data-type="rest">🟢 休息（不计入）</div>
        <div class="attendance-option" data-type="none">❌ 取消标记</div>
      </div>
      <button id="saveAttendanceBtn" style="width:100%; padding:12px; background:#007aff; color:white; border:none; border-radius:10px; font-size:1rem; margin-top:5px;">保存</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'ledger_records';
    const ATTENDANCE_KEY = 'attendance_records';
    const LAST_INPUT_KEY = 'ledger_last_input';

    let currentYear, currentMonth;
    let records = [];
    let attendanceRecords = {};
    let selectedDate = null;
    let lastInput = { category: '', note: '' };

    function showToast(msg, duration = 2000) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), duration);
    }

    function loadRecords() {
      const raw = localStorage.getItem(STORAGE_KEY);
      records = raw ? JSON.parse(raw) : [];
    }
    function saveRecords() { localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); }

    function loadAttendance() {
      const raw = localStorage.getItem(ATTENDANCE_KEY);
      attendanceRecords = raw ? JSON.parse(raw) : {};
    }
    function saveAttendance() { localStorage.setItem(ATTENDANCE_KEY, JSON.stringify(attendanceRecords)); }

    function loadLastInput() {
      const raw = localStorage.getItem(LAST_INPUT_KEY);
      lastInput = raw ? JSON.parse(raw) : { category: '', note: '' };
    }
    function saveLastInput(category, note) {
      lastInput = { category, note };
      localStorage.setItem(LAST_INPUT_KEY, JSON.stringify(lastInput));
    }

    function getAvailableMonths() {
      const months = new Set();
      records.forEach(r => {
        const parts = r.date.split('-');
        if (parts.length >= 2) months.add(`${parts[0]}-${parts[1]}`);
      });
      Object.keys(attendanceRecords).forEach(date => {
        const parts = date.split('-');
        if (parts.length >= 2) months.add(`${parts[0]}-${parts[1]}`);
      });
      if (months.size === 0) {
        const y = new Date().getFullYear();
        for (let m = 1; m <= 12; m++) {
          months.add(`${y}-${String(m).padStart(2,'0')}`);
        }
      }
      return Array.from(months).sort();
    }

    function exportSelectedMonths(selectedMonths) {
      if (selectedMonths.length === 0) {
        alert('请至少选择一个月份');
        return;
      }
      const filteredRecords = records.filter(r => {
        const parts = r.date.split('-');
        const key = `${parts[0]}-${parts[1]}`;
        return selectedMonths.includes(key);
      });
      const filteredAttendance = {};
      Object.entries(attendanceRecords).forEach(([date, att]) => {
        const parts = date.split('-');
        const key = `${parts[0]}-${parts[1]}`;
        if (selectedMonths.includes(key)) {
          filteredAttendance[date] = att;
        }
      });
      const data = {
        version: 1,
        exportTime: new Date().toISOString(),
        totalRecords: filteredRecords.length,
        records: filteredRecords,
        attendance: filteredAttendance
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      const monthStr = selectedMonths.map(m => m.replace('-', '年') + '月').join('_');
      link.download = `记账数据备份_${monthStr}.json`;
      link.href = url;
      document.body.appendChild(link);
      link.click();
      setTimeout(() => {
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
      }, 200);
      showToast(`✅ 已导出 ${filteredRecords.length} 条记录`);
    }

    function importData(file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          if (!data.records || !Array.isArray(data.records)) throw new Error('格式错误');
          const valid = data.records.filter(r => r.id && r.date && r.category && typeof r.amount === 'number');
          if (valid.length === 0) throw new Error('无有效记录');
          const mode = confirm('确定：替换现有数据\n取消：合并（追加）');
          if (mode) {
            records = valid;
            attendanceRecords = data.attendance || {};
          } else {
            const ids = new Set(records.map(r => r.id));
            records = [...records, ...valid.filter(r => !ids.has(r.id))];
            if (data.attendance) attendanceRecords = { ...attendanceRecords, ...data.attendance };
          }
          saveRecords();
          saveAttendance();
          renderCalendar();
          showToast('✅ 导入成功');
        } catch (err) { alert('导入失败：' + err.message); }
      };
      reader.readAsText(file);
    }

    function clearAllData() {
      records = [];
      attendanceRecords = {};
      saveRecords();
      saveAttendance();
      renderCalendar();
      showToast('🗑️ 数据已清空');
    }

    function getRecordsByDate(dateStr) { return records.filter(r => r.date === dateStr); }
    function getRecordsByMonth(year, month) {
      const prefix = `${year}-${String(month).padStart(2,'0')}`;
      return records.filter(r => r.date.startsWith(prefix));
    }
    function getDayTotal(dateStr) { return getRecordsByDate(dateStr).reduce((sum, r) => sum + r.amount, 0); }

    function getAttendanceByDate(dateStr) { return attendanceRecords[dateStr] || null; }

    function getAttendanceStats(year, month) {
      let full = 0, half = 0, overtime = 0, rest = 0;
      const prefix = `${year}-${String(month).padStart(2,'0')}`;
      Object.entries(attendanceRecords).forEach(([date, att]) => {
        if (date.startsWith(prefix)) {
          if (att.type === 'full') full++;
          else if (att.type === 'half') half += 0.5;
          else if (att.type === 'overtime') overtime += (att.value || 0);
          else if (att.type === 'rest') rest++;
        }
      });
      return { full, half, overtime, rest, total: full + half + overtime };
    }

    function getDetailedSummary(year, month) {
      const monthRecords = getRecordsByMonth(year, month);
      const summary = {};
      monthRecords.forEach(r => {
        if (!summary[r.category]) summary[r.category] = { total: 0, records: [] };
        summary[r.category].total += r.amount;
        summary[r.category].records.push({
          day: parseInt(r.date.split('-')[2]),
          amount: r.amount,
          note: r.note,
          date: r.date
        });
      });
      Object.values(summary).forEach(cat => cat.records.sort((a, b) => a.day - b.day));
      return summary;
    }

    function renameCategory(oldName, newName) {
      newName = newName.trim();
      if (!newName) return alert('分类名不能为空');
      if (oldName === newName) return;
      if (getRecordsByMonth(currentYear, currentMonth).some(r => r.category === newName)) {
        return alert(`"${newName}" 已存在`);
      }
      records.forEach(r => { if (r.category === oldName) r.category = newName; });
      saveRecords();
      renderCalendar();
    }

    function renderCalendar() {
      document.getElementById('monthTitle').textContent = `${currentYear}年 ${currentMonth}月`;
      const firstDay = new Date(currentYear, currentMonth - 1, 1);
      const startDay = firstDay.getDay();
      const prev = startDay;
      const totalCells = 42;
      const cal = document.getElementById('calendar');
      cal.innerHTML = '';

      ['日','一','二','三','四','五','六'].forEach(d => {
        const label = document.createElement('div');
        label.className = 'day-label';
        label.textContent = d;
        cal.appendChild(label);
      });

      const today = new Date();
      const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

      for (let i = 0; i < totalCells; i++) {
        const offset = i - prev + 1;
        const cellDate = new Date(currentYear, currentMonth - 1, offset);
        const cellMonth = cellDate.getMonth() + 1;
        const cellYear = cellDate.getFullYear();
        const dateStr = `${cellYear}-${String(cellMonth).padStart(2,'0')}-${String(cellDate.getDate()).padStart(2,'0')}`;

        const cell = document.createElement('div');
        if (cellMonth !== currentMonth) {
          cell.className = 'day-cell empty';
        } else {
          cell.className = 'day-cell';
          const content = document.createElement('div');
          content.className = 'cell-content';
          const dateSpan = document.createElement('span');
          dateSpan.textContent = cellDate.getDate();
          content.appendChild(dateSpan);

          if (dateStr === todayStr) cell.classList.add('today');

          const total = getDayTotal(dateStr);
          if (total !== 0) {
            cell.classList.add('has-record');
            const amtSpan = document.createElement('span');
            amtSpan.className = 'amount';
            if (total < 0) amtSpan.classList.add('negative');
            amtSpan.textContent = total < 0 ? `-¥${Math.abs(total).toFixed(1)}` : `¥${total.toFixed(1)}`;
            content.appendChild(amtSpan);
          }

          const att = getAttendanceByDate(dateStr);
          if (att) {
            const dot = document.createElement('span');
            dot.className = 'attendance-dot';
            dot.style.backgroundColor = {
              full: '#007aff', half: '#fd7e14', overtime: '#dc3545', rest: '#28a745'
            }[att.type] || '#28a745';
            content.insertBefore(dot, content.firstChild);
          }

          cell.appendChild(content);
          cell.addEventListener('click', () => openModal(dateStr));
        }
        cal.appendChild(cell);
      }

      renderSummary();
    }

    function renderSummary() {
      const container = document.getElementById('summaryContent');
      const summary = getDetailedSummary(currentYear, currentMonth);
      const cats = Object.keys(summary);
      let html = '';

      if (cats.length === 0) {
        html += '<p style="color:#888;">这个月还没有消费记录</p>';
      } else {
        cats.sort((a,b) => summary[b].total - summary[a].total);
        let grandTotal = 0;
        cats.forEach((cat, i) => {
          const data = summary[cat];
          grandTotal += data.total;
          const days = [...new Set(data.records.map(r => r.day))].sort((a,b)=>a-b);
          const daysHtml = days.map(d => `<span>${d}号</span>`).join('');
          const totalDisplay = data.total < 0 ? `-¥${Math.abs(data.total).toFixed(2)}` : `¥${data.total.toFixed(2)}`;
          html += `
            <div class="summary-category">
              <div class="summary-category-header">
                <div class="summary-category-name-row">
                  <span class="summary-category-name" id="catName_${i}">${cat}</span>
                  <span class="edit-category-row" id="editRow_${i}" style="display:none;">
                    <input type="text" id="editInput_${i}" value="${cat}">
                    <button class="btn-sm btn-edit-confirm" onclick="confirmRename('${cat}',${i})">✓</button>
                    <button class="btn-sm btn-edit-cancel" onclick="cancelEdit(${i})">✕</button>
                  </span>
                </div>
                <span class="summary-category-amount ${data.total<0?'negative':''}">${totalDisplay}</span>
              </div>
              <div class="summary-category-days">${daysHtml}</div>
              <div style="margin-top:6px;">
                <button class="btn-sm btn-edit" onclick="startEdit(${i})">✏️ 改名</button>
                <button class="btn-sm btn-export" onclick="event.stopPropagation(); exportCategoryToImage('${cat}')">📷 导出</button>
              </div>
            </div>`;
        });
        html += `<div class="summary-total"><span>合计</span><span>${grandTotal<0?'-¥'+Math.abs(grandTotal).toFixed(2):'¥'+grandTotal.toFixed(2)}</span></div>`;
      }

      const att = getAttendanceStats(currentYear, currentMonth);
      if (att.total > 0 || att.rest > 0) {
        html += `
          <div class="attendance-stats">
            <h4><span>📅 本月出勤统计</span><button class="btn-sm btn-export" id="exportAttendanceBtn">📷 导出</button></h4>
            <div class="stat-row"><span>🔵 全天</span><span>${att.full} 天</span></div>
            <div class="stat-row"><span>🟠 半天</span><span>${att.half} 天</span></div>
            <div class="stat-row"><span>🔴 加班</span><span>${att.overtime.toFixed(1)} 天</span></div>
            <div class="stat-row"><span>🟢 休息</span><span>${att.rest} 天</span></div>
            <div class="stat-row" style="font-weight:bold;"><span>📌 合计出勤</span><span>${att.total.toFixed(1)} 天</span></div>
          </div>`;
      }

      container.innerHTML = html;

      if (att.total > 0 || att.rest > 0) {
        document.getElementById('exportAttendanceBtn').addEventListener('click', exportAttendanceToImage);
      }
    }

    async function exportAttendanceToImage() {
      const att = getAttendanceStats(currentYear, currentMonth);
      const monthStr = `${currentYear}年${currentMonth}月`;
      const div = document.createElement('div');
      div.style.cssText = 'padding:20px;background:white;font-family:system-ui;width:400px;';
      div.innerHTML = `
        <h3 style="text-align:center;margin-bottom:10px;">📅 ${monthStr} 出勤统计</h3>
        <div style="background:#e8f5e9;padding:15px;border-radius:10px;">
          <div style="display:flex;justify-content:space-between;margin:5px 0;"><span>🔵 全天</span><span>${att.full} 天</span></div>
          <div style="display:flex;justify-content:space-between;margin:5px 0;"><span>🟠 半天</span><span>${att.half} 天</span></div>
          <div style="display:flex;justify-content:space-between;margin:5px 0;"><span>🔴 加班</span><span>${att.overtime.toFixed(1)} 天</span></div>
          <div style="display:flex;justify-content:space-between;margin:5px 0;"><span>🟢 休息</span><span>${att.rest} 天</span></div>
          <div style="border-top:2px solid #333;margin-top:8px;padding-top:5px;font-weight:bold;display:flex;justify-content:space-between;"><span>📌 合计出勤</span><span>${att.total.toFixed(1)} 天</span></div>
        </div>
        <div style="text-align:center;margin-top:15px;color:#999;font-size:0.75rem;">导出时间：${new Date().toLocaleString()}</div>
      `;
      document.body.appendChild(div);
      try {
        const canvas = await html2canvas(div, { backgroundColor: '#fff', scale: 2 });
        const a = document.createElement('a');
        a.download = `出勤统计_${monthStr}.png`;
        a.href = canvas.toDataURL('image/png');
        a.click();
      } catch (e) { alert('导出失败'); }
      document.body.removeChild(div);
    }

    window.startEdit = i => {
      document.getElementById(`catName_${i}`).style.display = 'none';
      document.getElementById(`editRow_${i}`).style.display = 'flex';
      document.getElementById(`editInput_${i}`).focus();
    };
    window.cancelEdit = i => {
      document.getElementById(`catName_${i}`).style.display = 'inline';
      document.getElementById(`editRow_${i}`).style.display = 'none';
    };
    window.confirmRename = (old, i) => renameCategory(old, document.getElementById(`editInput_${i}`).value);

    window.exportCategoryToImage = async function(cat) {
      const data = getDetailedSummary(currentYear, currentMonth)[cat];
      if (!data) return alert('无记录');
      document.getElementById('loadingOverlay').classList.add('active');
      const monthStr = `${currentYear}年${currentMonth}月`;
      let inner = `<div class="export-area"><div class="export-title">📌 ${cat}</div><div class="export-subtitle">${monthStr} 消费明细</div><div class="export-category">`;
      data.records.forEach(r => {
        const cls = r.amount < 0 ? 'negative' : 'positive';
        const disp = r.amount < 0 ? `-¥${Math.abs(r.amount).toFixed(2)}` : `¥${r.amount.toFixed(2)}`;
        inner += `<div class="export-detail-item"><span><span class="detail-date">${r.day}号</span>${r.note?`<span class="detail-note"> - ${r.note}</span>`:''}</span><span class="detail-amount ${cls}">${disp}</span></div>`;
      });
      const totalCls = data.total < 0 ? 'negative' : 'positive';
      const totalDisp = data.total < 0 ? `-¥${Math.abs(data.total).toFixed(2)}` : `¥${data.total.toFixed(2)}`;
      inner += `<div class="export-category-total"><span>小计</span><span class="detail-amount ${totalCls}">${totalDisp}</span></div></div><div style="text-align:center;margin-top:15px;color:#999;font-size:0.75rem;">导出时间：${new Date().toLocaleString()}</div></div>`;
      document.getElementById('exportTemplate').innerHTML = inner;
      try {
        const canvas = await html2canvas(document.querySelector('.export-area'), { backgroundColor: '#fff', scale: 2 });
        const a = document.createElement('a');
        a.download = `${cat}_${monthStr}.png`;
        a.href = canvas.toDataURL('image/png');
        a.click();
      } catch (e) { alert('导出失败'); }
      document.getElementById('loadingOverlay').classList.remove('active');
    };

    function openModal(dateStr) {
      selectedDate = dateStr;
      document.getElementById('modalDate').textContent = `📅 ${dateStr}`;
      renderModalRecords();
      fillLastInput();
      document.body.classList.add('modal-open');
      document.getElementById('modal').classList.add('active');
      document.getElementById('modalContent').scrollTop = 0;
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
      document.body.classList.remove('modal-open');
      selectedDate = null;
    }

    function fillLastInput() {
      document.getElementById('category').value = lastInput.category || '';
      document.getElementById('note').value = lastInput.note || '';
      document.getElementById('categoryHint').textContent = lastInput.category ? '已填入上次记录' : '';
      document.getElementById('noteHint').textContent = lastInput.note ? '已填入上次记录' : '';
      document.getElementById('amount').value = '';
    }

    function clearForm() {
      document.getElementById('category').value = '';
      document.getElementById('amount').value = '';
      document.getElementById('note').value = '';
      document.getElementById('categoryHint').textContent = '';
      document.getElementById('noteHint').textContent = '';
      document.getElementById('amount').focus();
    }

    function renderModalRecords() {
      const container = document.getElementById('modalRecords');
      const dayRecs = getRecordsByDate(selectedDate);
      if (!dayRecs.length) return container.innerHTML = '<p style="color:#888;text-align:center;padding:10px;">当天暂无记录</p>';
      container.innerHTML = dayRecs.map(r => {
        const cls = r.amount < 0 ? 'negative' : 'positive';
        const disp = r.amount < 0 ? `-¥${Math.abs(r.amount).toFixed(2)}` : `¥${r.amount.toFixed(2)}`;
        return `<div class="record-item"><div class="info"><strong>${r.category}</strong>${r.note?`<small>${r.note}</small>`:''}</div><span class="amount-text ${cls}">${disp}</span><button class="delete-btn" data-id="${r.id}">×</button></div>`;
      }).join('');
      container.querySelectorAll('.delete-btn').forEach(b => b.addEventListener('click', e => {
        records = records.filter(r => r.id != e.target.dataset.id);
        saveRecords();
        renderModalRecords();
        renderCalendar();
      }));
    }

    const attendanceModal = document.getElementById('attendanceModal');
    let selectedAttType = null;

    function updateAttUI() {
      document.querySelectorAll('#attendanceOptions .attendance-option').forEach(o => {
        o.classList.toggle('selected', o.dataset.type === selectedAttType);
        const input = o.querySelector('input');
        if (input) input.style.display = (selectedAttType === 'overtime') ? 'inline-block' : 'none';
      });
    }

    document.getElementById('openAttendanceBtn').addEventListener('click', () => {
      const cur = getAttendanceByDate(selectedDate);
      selectedAttType = cur ? cur.type : null;
      if (cur?.type === 'overtime') document.getElementById('overtimeHours').value = cur.value;
      else document.getElementById('overtimeHours').value = '';
      document.getElementById('attendanceDateTitle').textContent = `出勤设置 - ${selectedDate}`;
      updateAttUI();
      attendanceModal.classList.add('active');
    });

    document.getElementById('attendanceOptions').addEventListener('click', e => {
      const opt = e.target.closest('.attendance-option');
      if (!opt) return;
      selectedAttType = opt.dataset.type;
      updateAttUI();
    });

    document.getElementById('closeAttendanceModal').addEventListener('click', () => attendanceModal.classList.remove('active'));
    document.getElementById('saveAttendanceBtn').addEventListener('click', () => {
      if (!selectedDate) return;
      if (!selectedAttType || selectedAttType === 'none') {
        delete attendanceRecords[selectedDate];
      } else if (selectedAttType === 'overtime') {
        const val = parseFloat(document.getElementById('overtimeHours').value);
        if (isNaN(val) || val <= 0) return alert('请输入有效加班天数');
        attendanceRecords[selectedDate] = { type: 'overtime', value: val };
      } else {
        attendanceRecords[selectedDate] = { type: selectedAttType };
      }
      saveAttendance();
      attendanceModal.classList.remove('active');
      renderCalendar();
      showToast('✅ 出勤已更新');
    });
    attendanceModal.addEventListener('click', e => { if (e.target === attendanceModal) attendanceModal.classList.remove('active'); });

    document.getElementById('addRecord').addEventListener('click', () => {
      if (!selectedDate) return;
      const category = document.getElementById('category').value.trim();
      const amount = parseFloat(document.getElementById('amount').value);
      const note = document.getElementById('note').value.trim();
      if (!category) return alert('请输入分类名称');
      if (isNaN(amount) || amount === 0) return alert('请输入有效金额');
      saveLastInput(category, note);
      records.push({ id: Date.now(), date: selectedDate, category, amount, note });
      saveRecords();
      document.getElementById('amount').value = '';
      document.getElementById('amount').focus();
      renderModalRecords();
      renderCalendar();
    });

    document.getElementById('clearForm').addEventListener('click', clearForm);
    document.getElementById('closeModal').addEventListener('click', closeModal);
    document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });
    document.getElementById('modalContent').addEventListener('touchmove', e => e.stopPropagation(), { passive: false });

    document.getElementById('exportDataBtn').addEventListener('click', () => {
      const months = getAvailableMonths();
      const monthList = document.getElementById('monthList');
      monthList.innerHTML = months.map(m => {
        const [y, mo] = m.split('-');
        return `<div class="month-item"><input type="checkbox" id="chk_${m}" value="${m}" checked><label for="chk_${m}">${y}年${mo}月</label></div>`;
      }).join('');
      document.getElementById('monthSelectModal').classList.add('active');
    });

    document.getElementById('closeMonthSelect').addEventListener('click', () => {
      document.getElementById('monthSelectModal').classList.remove('active');
    });

    document.getElementById('selectAllMonths').addEventListener('click', () => {
      document.querySelectorAll('#monthList input[type="checkbox"]').forEach(cb => cb.checked = true);
    });
    document.getElementById('deselectAllMonths').addEventListener('click', () => {
      document.querySelectorAll('#monthList input[type="checkbox"]').forEach(cb => cb.checked = false);
    });

    document.getElementById('confirmExportBtn').addEventListener('click', () => {
      const checked = Array.from(document.querySelectorAll('#monthList input[type="checkbox"]:checked')).map(cb => cb.value);
      document.getElementById('monthSelectModal').classList.remove('active');
      exportSelectedMonths(checked);
    });

    document.getElementById('importDataBtn').addEventListener('click', () => document.getElementById('importFileInput').click());
    document.getElementById('importFileInput').addEventListener('change', e => {
      if (e.target.files[0]) { importData(e.target.files[0]); e.target.value = ''; }
    });

    let confirmCb = null;
    document.getElementById('clearAllBtn').addEventListener('click', () => {
      document.getElementById('confirmMessage').textContent = '确定清空所有数据？建议先导出备份。';
      confirmCb = clearAllData;
      document.getElementById('confirmDialog').classList.add('active');
    });
    document.getElementById('confirmCancel').addEventListener('click', () => {
      document.getElementById('confirmDialog').classList.remove('active');
    });
    document.getElementById('confirmOk').addEventListener('click', () => {
      document.getElementById('confirmDialog').classList.remove('active');
      if (confirmCb) confirmCb();
    });

    document.getElementById('prevMonth').addEventListener('click', () => {
      if (currentMonth === 1) { currentMonth = 12; currentYear--; }
      else currentMonth--;
      renderCalendar();
    });
    document.getElementById('nextMonth').addEventListener('click', () => {
      if (currentMonth === 12) { currentMonth = 1; currentYear++; }
      else currentMonth++;
      renderCalendar();
    });

    document.querySelectorAll('#modalContent input').forEach(i => {
      i.addEventListener('focus', () => setTimeout(() => i.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300));
    });

    const now = new Date();
    currentYear = now.getFullYear();
    currentMonth = now.getMonth() + 1;
    loadRecords();
    loadAttendance();
    loadLastInput();
    renderCalendar();
  </script>
</body>
</html>
